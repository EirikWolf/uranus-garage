<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <rect width="800" height="450" fill="#1a1a1a"/>
  <text x="400" y="30" text-anchor="middle" fill="#f5f5f5" font-family="sans-serif" font-size="18" font-weight="bold">Maris Otter — Maltprofil og Karakteristikk</text>

  <!-- Grain cross-section illustration -->
  <g transform="translate(60, 60)">
    <text x="75" y="0" text-anchor="middle" fill="#e0a030" font-family="sans-serif" font-size="13" font-weight="bold">KORNSNITT</text>
    <!-- Outer husk -->
    <ellipse cx="75" cy="120" rx="40" ry="85" fill="#8B6914" stroke="#e0a030" stroke-width="2"/>
    <!-- Aleurone layer -->
    <ellipse cx="75" cy="120" rx="32" ry="74" fill="#a07820" stroke="#c08820" stroke-width="1"/>
    <!-- Endosperm -->
    <ellipse cx="75" cy="120" rx="24" ry="62" fill="#d4a840" stroke="#e0b840" stroke-width="1"/>
    <!-- Embryo -->
    <ellipse cx="75" cy="175" rx="12" ry="18" fill="#6a8820" stroke="#5aaa5a" stroke-width="1"/>
    <!-- Labels -->
    <line x1="115" y1="85" x2="140" y2="70" stroke="#888" stroke-width="1"/>
    <text x="142" y="68" fill="#888" font-family="sans-serif" font-size="9">Skall</text>
    <line x1="107" y1="105" x2="140" y2="100" stroke="#c08820" stroke-width="1"/>
    <text x="142" y="103" fill="#c08820" font-family="sans-serif" font-size="9">Aleuron</text>
    <line x1="99" y1="120" x2="140" y2="130" stroke="#e0b840" stroke-width="1"/>
    <text x="142" y="133" fill="#e0b840" font-family="sans-serif" font-size="9">Endosperm</text>
    <line x1="87" y1="175" x2="140" y2="175" stroke="#5aaa5a" stroke-width="1"/>
    <text x="142" y="178" fill="#5aaa5a" font-family="sans-serif" font-size="9">Embryo</text>
    <text x="75" y="230" text-anchor="middle" fill="#e0a030" font-family="sans-serif" font-size="12" font-weight="bold">MARIS OTTER</text>
    <text x="75" y="248" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="9">Hordeum vulgare</text>
  </g>

  <!-- Flavor wheel -->
  <g transform="translate(290, 60)">
    <text x="100" y="0" text-anchor="middle" fill="#f5f5f5" font-family="sans-serif" font-size="13" font-weight="bold">SMAKSPROFIL</text>
    <g transform="translate(100, 120)">
      <circle cx="0" cy="0" r="22" fill="#e0a030" opacity="0.3"/>
      <text x="0" y="4" text-anchor="middle" fill="#e0a030" font-family="sans-serif" font-size="8" font-weight="bold">M.O.</text>
      <!-- Biscuit -->
      <circle cx="0" cy="-72" r="32" fill="#e0a030" opacity="0.15" stroke="#e0a030" stroke-width="1.5"/>
      <text x="0" y="-75" text-anchor="middle" fill="#e0a030" font-family="sans-serif" font-size="11" font-weight="bold">KJEKS</text>
      <text x="0" y="-61" text-anchor="middle" fill="#c08020" font-family="sans-serif" font-size="9">Biscuit, Korn</text>
      <!-- Nutty -->
      <circle cx="66" cy="-33" r="28" fill="#dd3333" opacity="0.15" stroke="#dd3333" stroke-width="1.5"/>
      <text x="66" y="-37" text-anchor="middle" fill="#dd3333" font-family="sans-serif" font-size="11" font-weight="bold">NØTTER</text>
      <text x="66" y="-24" text-anchor="middle" fill="#bb2222" font-family="sans-serif" font-size="9">Valnøtt, Hasselnøtt</text>
      <!-- Toast -->
      <circle cx="55" cy="55" r="28" fill="#9b6bc7" opacity="0.15" stroke="#9b6bc7" stroke-width="1.5"/>
      <text x="55" y="52" text-anchor="middle" fill="#9b6bc7" font-family="sans-serif" font-size="11" font-weight="bold">TOAST</text>
      <text x="55" y="66" text-anchor="middle" fill="#7b4ba7" font-family="sans-serif" font-size="9">Ristet brød</text>
      <!-- Honey -->
      <circle cx="-55" cy="55" r="28" fill="#4a90d9" opacity="0.15" stroke="#4a90d9" stroke-width="1.5"/>
      <text x="-55" y="52" text-anchor="middle" fill="#4a90d9" font-family="sans-serif" font-size="11" font-weight="bold">HONNING</text>
      <text x="-55" y="66" text-anchor="middle" fill="#3a70b9" font-family="sans-serif" font-size="9">Søt, Blomst</text>
      <!-- Bread -->
      <circle cx="-66" cy="-33" r="28" fill="#5aaa5a" opacity="0.15" stroke="#5aaa5a" stroke-width="1.5"/>
      <text x="-66" y="-37" text-anchor="middle" fill="#5aaa5a" font-family="sans-serif" font-size="11" font-weight="bold">BRØD</text>
      <text x="-66" y="-24" text-anchor="middle" fill="#3a8a3a" font-family="sans-serif" font-size="9">Nybakt brød</text>
    </g>
  </g>

  <!-- Comparison bar chart -->
  <g transform="translate(530, 55)">
    <text x="120" y="0" text-anchor="middle" fill="#f5f5f5" font-family="sans-serif" font-size="13" font-weight="bold">SAMMENLIGNING</text>
    <!-- Y axis label -->
    <text x="-5" y="20" fill="#888" font-family="sans-serif" font-size="9" text-anchor="middle">Farge</text>
    <text x="-5" y="75" fill="#888" font-family="sans-serif" font-size="9" text-anchor="middle">Smak</text>
    <text x="-5" y="130" fill="#888" font-family="sans-serif" font-size="9" text-anchor="middle">Enzym</text>

    <!-- Maris Otter bars -->
    <rect x="20" y="8" width="50" height="22" rx="3" fill="#e0a030" opacity="0.85"/>
    <text x="45" y="23" text-anchor="middle" fill="#1a1a1a" font-family="sans-serif" font-size="8" font-weight="bold">3.0 L</text>
    <rect x="20" y="63" width="50" height="22" rx="3" fill="#e0a030" opacity="0.85"/>
    <text x="45" y="78" text-anchor="middle" fill="#1a1a1a" font-family="sans-serif" font-size="8" font-weight="bold">Rik</text>
    <rect x="20" y="118" width="50" height="22" rx="3" fill="#e0a030" opacity="0.85"/>
    <text x="45" y="133" text-anchor="middle" fill="#1a1a1a" font-family="sans-serif" font-size="8" font-weight="bold">Høy</text>

    <!-- Pale Ale Malt bars -->
    <rect x="85" y="8" width="50" height="18" rx="3" fill="#5aaa5a" opacity="0.8"/>
    <text x="110" y="21" text-anchor="middle" fill="#1a1a1a" font-family="sans-serif" font-size="8" font-weight="bold">2.0 L</text>
    <rect x="85" y="63" width="50" height="17" rx="3" fill="#5aaa5a" opacity="0.8"/>
    <text x="110" y="76" text-anchor="middle" fill="#1a1a1a" font-family="sans-serif" font-size="8" font-weight="bold">Nøytral</text>
    <rect x="85" y="118" width="50" height="22" rx="3" fill="#5aaa5a" opacity="0.8"/>
    <text x="110" y="133" text-anchor="middle" fill="#1a1a1a" font-family="sans-serif" font-size="8" font-weight="bold">Høy</text>

    <!-- Pilsner Malt bars -->
    <rect x="150" y="8" width="50" height="12" rx="3" fill="#4a90d9" opacity="0.8"/>
    <text x="175" y="19" text-anchor="middle" fill="#1a1a1a" font-family="sans-serif" font-size="8" font-weight="bold">1.5 L</text>
    <rect x="150" y="63" width="50" height="10" rx="3" fill="#4a90d9" opacity="0.8"/>
    <text x="175" y="74" text-anchor="middle" fill="#1a1a1a" font-family="sans-serif" font-size="8" font-weight="bold">Lys</text>
    <rect x="150" y="118" width="50" height="25" rx="3" fill="#4a90d9" opacity="0.8"/>
    <text x="175" y="135" text-anchor="middle" fill="#1a1a1a" font-family="sans-serif" font-size="8" font-weight="bold">Svært høy</text>

    <!-- Legend -->
    <rect x="20" y="155" width="12" height="10" fill="#e0a030"/>
    <text x="36" y="164" fill="#e0a030" font-family="sans-serif" font-size="9">Maris Otter</text>
    <rect x="85" y="155" width="12" height="10" fill="#5aaa5a"/>
    <text x="101" y="164" fill="#5aaa5a" font-family="sans-serif" font-size="9">Pale Ale</text>
    <rect x="150" y="155" width="12" height="10" fill="#4a90d9"/>
    <text x="166" y="164" fill="#4a90d9" font-family="sans-serif" font-size="9">Pilsner</text>
  </g>

  <!-- Stats panel -->
  <rect x="60" y="340" width="680" height="90" rx="8" stroke="#444" stroke-width="1" fill="#222"/>
  <g transform="translate(80, 360)">
    <text x="0" y="0" fill="#e0a030" font-family="sans-serif" font-size="12" font-weight="bold">FAKTA — MARIS OTTER</text>
    <text x="0" y="22" fill="#999" font-family="sans-serif" font-size="11">Farge: <tspan fill="#e0a030" font-weight="bold">2.5–3.5 Lovibond (EBC 5–7)</tspan></text>
    <text x="0" y="42" fill="#999" font-family="sans-serif" font-size="11">Opprinnelse: <tspan fill="#f5f5f5">England (1960-tallet)</tspan></text>
    <text x="0" y="62" fill="#999" font-family="sans-serif" font-size="11">Type: <tspan fill="#4a90d9">Base malt — brukes 80–100% av kornregningen</tspan></text>
    <text x="380" y="22" fill="#999" font-family="sans-serif" font-size="11">Ekstraktutbytte: <tspan fill="#5aaa5a">78–82%</tspan></text>
    <text x="380" y="42" fill="#999" font-family="sans-serif" font-size="11">Stiler: <tspan fill="#9b6bc7">Bitter, Pale Ale, Porter, Stout</tspan></text>
    <text x="380" y="62" fill="#999" font-family="sans-serif" font-size="11">Karakter: <tspan fill="#e0a030">Rik, kompleks biscuit-smak</tspan></text>
  </g>
</svg>
