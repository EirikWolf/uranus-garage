<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <rect width="800" height="450" fill="#1a1a1a"/>
  <text x="400" y="30" text-anchor="middle" fill="#f5f5f5" font-family="sans-serif" font-size="18" font-weight="bold">Safale US-05 — Arbeidshestegjæren</text>

  <!-- Yeast cell illustration -->
  <g transform="translate(45, 55)">
    <text x="80" y="0" text-anchor="middle" fill="#9b6bc7" font-family="sans-serif" font-size="13" font-weight="bold">GJÆRCELLER</text>
    <!-- Main cells -->
    <ellipse cx="80" cy="100" rx="35" ry="45" fill="#2d1a3d" stroke="#9b6bc7" stroke-width="2"/>
    <ellipse cx="80" cy="100" rx="25" ry="33" fill="#3a2050" stroke="#9b6bc7" stroke-width="1" opacity="0.6"/>
    <!-- Nucleus -->
    <circle cx="80" cy="100" r="10" fill="#9b6bc7" opacity="0.4"/>
    <circle cx="80" cy="100" r="5" fill="#9b6bc7" opacity="0.6"/>
    <!-- Budding cells -->
    <ellipse cx="115" cy="82" rx="20" ry="26" fill="#2d1a3d" stroke="#9b6bc7" stroke-width="1.5"/>
    <circle cx="115" cy="82" r="6" fill="#9b6bc7" opacity="0.4"/>
    <ellipse cx="52" cy="130" rx="18" ry="23" fill="#2d1a3d" stroke="#9b6bc7" stroke-width="1.5"/>
    <circle cx="52" cy="130" r="5" fill="#9b6bc7" opacity="0.4"/>
    <!-- CO2 bubbles -->
    <circle cx="95" cy="55" r="5" fill="#9b6bc7" opacity="0.3"/>
    <circle cx="70" cy="48" r="3" fill="#9b6bc7" opacity="0.25"/>
    <circle cx="108" cy="44" r="4" fill="#9b6bc7" opacity="0.2"/>
    <text x="80" y="165" text-anchor="middle" fill="#9b6bc7" font-family="sans-serif" font-size="11" font-weight="bold">SAFALE US-05</text>
    <text x="80" y="180" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="9">Saccharomyces cerevisiae</text>
    <text x="80" y="196" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="9">Tørrgjær — 11.5g pakke</text>
    <!-- Flavor: Clean label -->
    <rect x="20" y="210" width="120" height="28" rx="5" fill="#222" stroke="#5aaa5a" stroke-width="1.5"/>
    <text x="80" y="228" text-anchor="middle" fill="#5aaa5a" font-family="sans-serif" font-size="11" font-weight="bold">REN / NØYTRAL</text>
  </g>

  <!-- Fermentation curve -->
  <g transform="translate(230, 50)">
    <text x="180" y="0" text-anchor="middle" fill="#f5f5f5" font-family="sans-serif" font-size="13" font-weight="bold">GJÆRINGSKURVE (attenuation)</text>

    <!-- Chart area -->
    <rect x="40" y="15" width="320" height="190" rx="4" fill="#1e1e1e" stroke="#333" stroke-width="1"/>

    <!-- Grid lines -->
    <line x1="40" y1="62" x2="360" y2="62" stroke="#2a2a2a" stroke-width="1"/>
    <line x1="40" y1="110" x2="360" y2="110" stroke="#2a2a2a" stroke-width="1"/>
    <line x1="40" y1="157" x2="360" y2="157" stroke="#2a2a2a" stroke-width="1"/>

    <!-- Y axis labels (attenuation %) -->
    <text x="35" y="19" text-anchor="end" fill="#888" font-family="sans-serif" font-size="8">100%</text>
    <text x="35" y="65" text-anchor="end" fill="#888" font-family="sans-serif" font-size="8">75%</text>
    <text x="35" y="113" text-anchor="end" fill="#888" font-family="sans-serif" font-size="8">50%</text>
    <text x="35" y="160" text-anchor="end" fill="#888" font-family="sans-serif" font-size="8">25%</text>
    <text x="35" y="204" text-anchor="end" fill="#888" font-family="sans-serif" font-size="8">0%</text>

    <!-- Attenuation curve -->
    <path d="M40 205 Q80 205 100 170 Q130 110 160 70 Q190 42 220 30 Q250 24 280 22 Q310 21 360 20" stroke="#9b6bc7" stroke-width="2.5" fill="none"/>
    <path d="M40 205 Q80 205 100 170 Q130 110 160 70 Q190 42 220 30 Q250 24 280 22 Q310 21 360 20 L360 205 L40 205Z" fill="#9b6bc7" opacity="0.08"/>

    <!-- Target attenuation zone -->
    <rect x="40" y="20" width="320" height="42" rx="2" fill="#5aaa5a" opacity="0.07" stroke="#5aaa5a" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="360" y="30" text-anchor="end" fill="#5aaa5a" font-family="sans-serif" font-size="8">Mål: 73–77%</text>

    <!-- Day markers on X axis -->
    <line x1="40" y1="205" x2="360" y2="205" stroke="#555" stroke-width="1"/>
    <text x="40" y="218" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="8">Dag 0</text>
    <text x="120" y="218" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="8">Dag 2</text>
    <text x="200" y="218" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="8">Dag 4</text>
    <text x="280" y="218" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="8">Dag 7</text>
    <text x="360" y="218" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="8">Dag 14</text>

    <!-- Phase annotations -->
    <text x="70" y="200" text-anchor="middle" fill="#4a90d9" font-family="sans-serif" font-size="8">Lag</text>
    <text x="130" y="140" text-anchor="middle" fill="#9b6bc7" font-family="sans-serif" font-size="8">Aktiv</text>
    <text x="300" y="45" text-anchor="middle" fill="#5aaa5a" font-family="sans-serif" font-size="8">Kondisjonering</text>
  </g>

  <!-- Temperature range -->
  <g transform="translate(590, 50)">
    <text x="95" y="0" text-anchor="middle" fill="#f5f5f5" font-family="sans-serif" font-size="13" font-weight="bold">TEMPERATUR</text>

    <!-- Temp bar -->
    <defs>
      <linearGradient id="tempGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#dd3333"/>
        <stop offset="40%" stop-color="#e0a030"/>
        <stop offset="60%" stop-color="#5aaa5a"/>
        <stop offset="100%" stop-color="#4a90d9"/>
      </linearGradient>
    </defs>
    <rect x="60" y="18" width="30" height="200" rx="5" fill="url(#tempGrad)" opacity="0.8"/>

    <!-- Temperature markers -->
    <line x1="90" y1="18" x2="100" y2="18" stroke="#dd3333" stroke-width="1.5"/>
    <text x="104" y="22" fill="#dd3333" font-family="sans-serif" font-size="9">24°C — maks</text>

    <line x1="90" y1="78" x2="100" y2="78" stroke="#e0a030" stroke-width="1.5"/>
    <text x="104" y="82" fill="#e0a030" font-family="sans-serif" font-size="9">20°C</text>

    <!-- Sweet spot highlight -->
    <rect x="56" y="98" width="38" height="60" rx="3" fill="none" stroke="#5aaa5a" stroke-width="2.5"/>
    <line x1="94" y1="118" x2="104" y2="118" stroke="#5aaa5a" stroke-width="2"/>
    <text x="104" y="112" fill="#5aaa5a" font-family="sans-serif" font-size="9" font-weight="bold">18–20°C</text>
    <text x="104" y="124" fill="#5aaa5a" font-family="sans-serif" font-size="8">SWEET SPOT</text>

    <line x1="90" y1="158" x2="100" y2="158" stroke="#e0a030" stroke-width="1.5"/>
    <text x="104" y="162" fill="#e0a030" font-family="sans-serif" font-size="9">15°C</text>

    <line x1="90" y1="218" x2="100" y2="218" stroke="#4a90d9" stroke-width="1.5"/>
    <text x="104" y="222" fill="#4a90d9" font-family="sans-serif" font-size="9">12°C — min</text>
  </g>

  <!-- Stats panel -->
  <rect x="60" y="345" width="680" height="88" rx="8" stroke="#444" stroke-width="1" fill="#222"/>
  <g transform="translate(80, 362)">
    <text x="0" y="0" fill="#9b6bc7" font-family="sans-serif" font-size="12" font-weight="bold">FAKTA — SAFALE US-05</text>
    <text x="0" y="22" fill="#999" font-family="sans-serif" font-size="11">Attenuation: <tspan fill="#5aaa5a" font-weight="bold">73–77%</tspan></text>
    <text x="0" y="42" fill="#999" font-family="sans-serif" font-size="11">Temperaturområde: <tspan fill="#e0a030">15–24°C</tspan>  Sweet spot: <tspan fill="#5aaa5a">18–20°C</tspan></text>
    <text x="0" y="62" fill="#999" font-family="sans-serif" font-size="11">Produsent: <tspan fill="#f5f5f5">Fermentis (Belgia)</tspan></text>
    <text x="380" y="22" fill="#999" font-family="sans-serif" font-size="11">Flokkulering: <tspan fill="#e0a030">Middels-høy</tspan></text>
    <text x="380" y="42" fill="#999" font-family="sans-serif" font-size="11">Stiler: <tspan fill="#9b6bc7">Pale Ale, IPA, APA, Amber, Porter</tspan></text>
    <text x="380" y="62" fill="#999" font-family="sans-serif" font-size="11">Karakter: <tspan fill="#5aaa5a">Ren, nøytral — lar humle skinne</tspan></text>
  </g>
</svg>
