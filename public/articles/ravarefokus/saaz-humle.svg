<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <rect width="800" height="450" fill="#1a1a1a"/>
  <text x="400" y="30" text-anchor="middle" fill="#f5f5f5" font-family="sans-serif" font-size="18" font-weight="bold">Saaz — Edelhumle fra Žatec</text>

  <!-- Delicate hop cone illustration -->
  <g transform="translate(55, 55)">
    <text x="75" y="0" text-anchor="middle" fill="#5aaa5a" font-family="sans-serif" font-size="13" font-weight="bold">HUMLEKOGLE</text>
    <!-- Stem and vine -->
    <line x1="75" y1="28" x2="75" y2="38" stroke="#4a6a30" stroke-width="2"/>
    <path d="M55 32 Q45 25 50 18" stroke="#4a6a30" stroke-width="1.5" fill="none"/>
    <path d="M95 32 Q105 25 100 18" stroke="#4a6a30" stroke-width="1.5" fill="none"/>
    <!-- Outer bracts - delicate, narrow -->
    <ellipse cx="75" cy="120" rx="32" ry="90" fill="#2a3d1a" stroke="#5aaa5a" stroke-width="1.5"/>
    <ellipse cx="75" cy="108" rx="26" ry="72" fill="#2f4820" stroke="#5aaa5a" stroke-width="1"/>
    <ellipse cx="75" cy="98" rx="20" ry="54" fill="#354f25" stroke="#4a8a3a" stroke-width="1"/>
    <ellipse cx="75" cy="90" rx="14" ry="38" fill="#3a5528"/>
    <!-- Subtle bract lines -->
    <line x1="75" y1="38" x2="75" y2="210" stroke="#2a4018" stroke-width="2"/>
    <path d="M60 70 Q75 65 90 70" stroke="#4a7a30" stroke-width="1" fill="none"/>
    <path d="M55 95 Q75 88 95 95" stroke="#4a7a30" stroke-width="1" fill="none"/>
    <path d="M58 120 Q75 112 92 120" stroke="#4a7a30" stroke-width="1" fill="none"/>
    <path d="M60 145 Q75 138 90 145" stroke="#4a7a30" stroke-width="1" fill="none"/>
    <path d="M62 165 Q75 160 88 165" stroke="#4a7a30" stroke-width="1" fill="none"/>
    <!-- Tiny lupulin dots - sparse for noble hop -->
    <circle cx="70" cy="100" r="2" fill="#e0c030" opacity="0.5"/>
    <circle cx="82" cy="118" r="1.5" fill="#e0c030" opacity="0.4"/>
    <circle cx="68" cy="135" r="1.5" fill="#e0c030" opacity="0.5"/>
    <circle cx="80" cy="90" r="1.5" fill="#e0c030" opacity="0.4"/>
    <text x="75" y="230" text-anchor="middle" fill="#5aaa5a" font-family="sans-serif" font-size="12" font-weight="bold">SAAZ</text>
    <text x="75" y="248" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="9">Humulus lupulus</text>
    <text x="75" y="263" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="9">Žatec, Tsjekkia</text>
  </g>

  <!-- Aroma profile -->
  <g transform="translate(270, 55)">
    <text x="110" y="0" text-anchor="middle" fill="#f5f5f5" font-family="sans-serif" font-size="13" font-weight="bold">AROMAPROFIL</text>
    <g transform="translate(110, 128)">
      <circle cx="0" cy="0" r="22" fill="#5aaa5a" opacity="0.25"/>
      <text x="0" y="4" text-anchor="middle" fill="#5aaa5a" font-family="sans-serif" font-size="7" font-weight="bold">SAAZ</text>
      <!-- Spicy -->
      <circle cx="0" cy="-70" r="30" fill="#dd3333" opacity="0.12" stroke="#dd3333" stroke-width="1.5"/>
      <text x="0" y="-73" text-anchor="middle" fill="#dd3333" font-family="sans-serif" font-size="11" font-weight="bold">KRYDRET</text>
      <text x="0" y="-60" text-anchor="middle" fill="#bb2222" font-family="sans-serif" font-size="9">Pepper, Krydder</text>
      <!-- Herbal -->
      <circle cx="65" cy="-30" r="28" fill="#5aaa5a" opacity="0.12" stroke="#5aaa5a" stroke-width="1.5"/>
      <text x="65" y="-33" text-anchor="middle" fill="#5aaa5a" font-family="sans-serif" font-size="11" font-weight="bold">URTETE</text>
      <text x="65" y="-20" text-anchor="middle" fill="#3a8a3a" font-family="sans-serif" font-size="9">Te, Urter</text>
      <!-- Floral -->
      <circle cx="55" cy="52" r="28" fill="#9b6bc7" opacity="0.12" stroke="#9b6bc7" stroke-width="1.5"/>
      <text x="55" y="49" text-anchor="middle" fill="#9b6bc7" font-family="sans-serif" font-size="11" font-weight="bold">BLOMSTER</text>
      <text x="55" y="63" text-anchor="middle" fill="#7b4ba7" font-family="sans-serif" font-size="9">Subtil, Elegant</text>
      <!-- Earthy -->
      <circle cx="-65" cy="-30" r="28" fill="#e0a030" opacity="0.12" stroke="#e0a030" stroke-width="1.5"/>
      <text x="-65" y="-33" text-anchor="middle" fill="#e0a030" font-family="sans-serif" font-size="11" font-weight="bold">JORDLIG</text>
      <text x="-65" y="-20" text-anchor="middle" fill="#c08020" font-family="sans-serif" font-size="9">Jord, Mose</text>
      <!-- Soft/subtle note -->
      <circle cx="-55" cy="52" r="28" fill="#4a90d9" opacity="0.12" stroke="#4a90d9" stroke-width="1.5"/>
      <text x="-55" y="49" text-anchor="middle" fill="#4a90d9" font-family="sans-serif" font-size="11" font-weight="bold">MILD</text>
      <text x="-55" y="63" text-anchor="middle" fill="#3a70b9" font-family="sans-serif" font-size="9">Delikat, Ren</text>
    </g>
  </g>

  <!-- Map and usage -->
  <g transform="translate(550, 55)">
    <text x="110" y="0" text-anchor="middle" fill="#f5f5f5" font-family="sans-serif" font-size="13" font-weight="bold">BRUKSOMRÅDER</text>

    <!-- Simple Czech Republic map outline -->
    <rect x="45" y="15" width="130" height="75" rx="6" fill="#222" stroke="#444" stroke-width="1"/>
    <text x="110" y="38" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="9">TSJEKKIA</text>
    <!-- Stylized map shape -->
    <path d="M60 55 Q75 45 100 48 Q120 42 145 50 Q160 58 155 68 Q140 72 120 70 Q100 75 80 72 Q65 68 60 55Z" fill="#2a3a4a" stroke="#4a90d9" stroke-width="1" opacity="0.8"/>
    <!-- Pin on Žatec (NW Czech) -->
    <circle cx="88" cy="54" r="5" fill="#dd3333"/>
    <line x1="88" y1="54" x2="88" y2="75" stroke="#dd3333" stroke-width="1.5"/>
    <text x="88" y="85" text-anchor="middle" fill="#dd3333" font-family="sans-serif" font-size="8" font-weight="bold">Žatec</text>

    <!-- Usage styles -->
    <text x="0" y="115" fill="#888" font-family="sans-serif" font-size="10" font-weight="bold">BESTE ØLTYPER:</text>
    <!-- Style bars -->
    <rect x="0" y="123" width="220" height="22" rx="4" fill="#222" stroke="#333" stroke-width="1"/>
    <rect x="2" y="125" width="200" height="18" rx="3" fill="#4a90d9" opacity="0.7"/>
    <text x="10" y="138" fill="#f5f5f5" font-family="sans-serif" font-size="10" font-weight="bold">Tsjekkisk Pilsner / Bohemian Lager</text>

    <rect x="0" y="150" width="220" height="22" rx="4" fill="#222" stroke="#333" stroke-width="1"/>
    <rect x="2" y="152" width="160" height="18" rx="3" fill="#5aaa5a" opacity="0.7"/>
    <text x="10" y="165" fill="#f5f5f5" font-family="sans-serif" font-size="10" font-weight="bold">Belgiske Ales / Saison</text>

    <rect x="0" y="177" width="220" height="22" rx="4" fill="#222" stroke="#333" stroke-width="1"/>
    <rect x="2" y="179" width="130" height="18" rx="3" fill="#e0a030" opacity="0.7"/>
    <text x="10" y="192" fill="#1a1a1a" font-family="sans-serif" font-size="10" font-weight="bold">German Lager / Kölsch</text>

    <rect x="0" y="204" width="220" height="22" rx="4" fill="#222" stroke="#333" stroke-width="1"/>
    <rect x="2" y="206" width="100" height="18" rx="3" fill="#9b6bc7" opacity="0.7"/>
    <text x="10" y="219" fill="#f5f5f5" font-family="sans-serif" font-size="10" font-weight="bold">Wheat Beer / Wit</text>
  </g>

  <!-- Stats panel -->
  <rect x="60" y="340" width="680" height="90" rx="8" stroke="#444" stroke-width="1" fill="#222"/>
  <g transform="translate(80, 360)">
    <text x="0" y="0" fill="#5aaa5a" font-family="sans-serif" font-size="12" font-weight="bold">FAKTA — SAAZ</text>
    <text x="0" y="22" fill="#999" font-family="sans-serif" font-size="11">Alfa-syre: <tspan fill="#dd3333" font-weight="bold">2.5–4.5%</tspan> (svært lav — aromatisk)</text>
    <text x="0" y="42" fill="#999" font-family="sans-serif" font-size="11">Opprinnelse: <tspan fill="#f5f5f5">Žatec, Tsjekkia (500+ år gammel landrace)</tspan></text>
    <text x="0" y="62" fill="#999" font-family="sans-serif" font-size="11">Type: <tspan fill="#4a90d9">Edelhumle — Subtil og elegant</tspan></text>
    <text x="380" y="22" fill="#999" font-family="sans-serif" font-size="11">Beta-syre: <tspan fill="#e0a030">4–6%</tspan></text>
    <text x="380" y="42" fill="#999" font-family="sans-serif" font-size="11">Tilsetting: <tspan fill="#9b6bc7">Kok (bittering), Flameout, Dry hop</tspan></text>
    <text x="380" y="62" fill="#999" font-family="sans-serif" font-size="11">Karakter: <tspan fill="#5aaa5a">Delikat krydret, urte, blomster</tspan></text>
  </g>
</svg>
