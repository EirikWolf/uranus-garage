<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <rect width="800" height="450" fill="#1a1a1a"/>
  <text x="400" y="30" text-anchor="middle" fill="#f5f5f5" font-family="sans-serif" font-size="18" font-weight="bold">Munich Malt — Maltprofil og Bruksguide</text>

  <!-- Grain illustration with amber color -->
  <g transform="translate(50, 55)">
    <text x="80" y="0" text-anchor="middle" fill="#e0a030" font-family="sans-serif" font-size="13" font-weight="bold">MÜNCHEN MALT</text>
    <ellipse cx="80" cy="120" rx="38" ry="82" fill="#7a4510" stroke="#e0a030" stroke-width="2"/>
    <ellipse cx="80" cy="110" rx="30" ry="68" fill="#924f15" stroke="#c07820" stroke-width="1"/>
    <ellipse cx="80" cy="102" rx="22" ry="52" fill="#aa5f20" stroke="#d08828" stroke-width="1"/>
    <ellipse cx="80" cy="95" rx="14" ry="36" fill="#c07030"/>
    <line x1="80" y1="38" x2="80" y2="202" stroke="#6a3a0a" stroke-width="2"/>
    <path d="M65 75 Q80 68 95 75" stroke="#d08828" stroke-width="1" fill="none"/>
    <path d="M62 100 Q80 92 98 100" stroke="#d08828" stroke-width="1" fill="none"/>
    <path d="M65 125 Q80 118 95 125" stroke="#d08828" stroke-width="1" fill="none"/>
    <path d="M66 150 Q80 143 94 150" stroke="#d08828" stroke-width="1" fill="none"/>
    <text x="80" y="225" text-anchor="middle" fill="#e0a030" font-family="sans-serif" font-size="11" font-weight="bold">Lovibond: 8–10</text>
    <text x="80" y="241" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="9">EBC 16–20</text>
    <text x="80" y="257" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="9">Bayern, Tyskland</text>
  </g>

  <!-- Flavor profile -->
  <g transform="translate(255, 55)">
    <text x="100" y="0" text-anchor="middle" fill="#f5f5f5" font-family="sans-serif" font-size="13" font-weight="bold">SMAKSPROFIL</text>
    <g transform="translate(100, 125)">
      <circle cx="0" cy="0" r="22" fill="#e0a030" opacity="0.35"/>
      <text x="0" y="4" text-anchor="middle" fill="#1a1a1a" font-family="sans-serif" font-size="7" font-weight="bold">MUNICH</text>
      <circle cx="0" cy="-68" r="30" fill="#e0a030" opacity="0.15" stroke="#e0a030" stroke-width="1.5"/>
      <text x="0" y="-71" text-anchor="middle" fill="#e0a030" font-family="sans-serif" font-size="11" font-weight="bold">BRØD</text>
      <text x="0" y="-58" text-anchor="middle" fill="#c08020" font-family="sans-serif" font-size="9">Malt brød, Korn</text>
      <circle cx="64" cy="-30" r="28" fill="#dd3333" opacity="0.15" stroke="#dd3333" stroke-width="1.5"/>
      <text x="64" y="-33" text-anchor="middle" fill="#dd3333" font-family="sans-serif" font-size="11" font-weight="bold">TOAST</text>
      <text x="64" y="-20" text-anchor="middle" fill="#bb2222" font-family="sans-serif" font-size="9">Ristet, Nøtter</text>
      <circle cx="52" cy="52" r="28" fill="#9b6bc7" opacity="0.15" stroke="#9b6bc7" stroke-width="1.5"/>
      <text x="52" y="49" text-anchor="middle" fill="#9b6bc7" font-family="sans-serif" font-size="11" font-weight="bold">HONNING</text>
      <text x="52" y="63" text-anchor="middle" fill="#7b4ba7" font-family="sans-serif" font-size="9">Søt, Karamell</text>
      <circle cx="-64" cy="-30" r="28" fill="#5aaa5a" opacity="0.15" stroke="#5aaa5a" stroke-width="1.5"/>
      <text x="-64" y="-33" text-anchor="middle" fill="#5aaa5a" font-family="sans-serif" font-size="11" font-weight="bold">RIK MALT</text>
      <text x="-64" y="-20" text-anchor="middle" fill="#3a8a3a" font-family="sans-serif" font-size="9">Dybde, Fylde</text>
      <circle cx="-52" cy="52" r="28" fill="#4a90d9" opacity="0.15" stroke="#4a90d9" stroke-width="1.5"/>
      <text x="-52" y="49" text-anchor="middle" fill="#4a90d9" font-family="sans-serif" font-size="11" font-weight="bold">LETT RØKT</text>
      <text x="-52" y="63" text-anchor="middle" fill="#3a70b9" font-family="sans-serif" font-size="9">Subtil, Varm</text>
    </g>
  </g>

  <!-- Usage percentage guide -->
  <g transform="translate(510, 55)">
    <text x="130" y="0" text-anchor="middle" fill="#f5f5f5" font-family="sans-serif" font-size="13" font-weight="bold">BRUKSPROSENT → KARAKTER</text>

    <!-- 10% -->
    <rect x="0" y="18" width="260" height="36" rx="5" fill="#222" stroke="#333" stroke-width="1"/>
    <rect x="2" y="20" width="24" height="32" rx="4" fill="#e0a030" opacity="0.6"/>
    <text x="32" y="33" fill="#e0a030" font-family="sans-serif" font-size="11" font-weight="bold">10%</text>
    <text x="32" y="47" fill="#888" font-family="sans-serif" font-size="10">Subtil maltdybde, bakgrunnsnoter</text>

    <!-- 40% -->
    <rect x="0" y="62" width="260" height="36" rx="5" fill="#222" stroke="#333" stroke-width="1"/>
    <rect x="2" y="64" width="100" height="32" rx="4" fill="#e0a030" opacity="0.75"/>
    <text x="108" y="78" fill="#e0a030" font-family="sans-serif" font-size="11" font-weight="bold">40%</text>
    <text x="108" y="92" fill="#888" font-family="sans-serif" font-size="10">Tydelig maltkarakter</text>

    <!-- 100% -->
    <rect x="0" y="106" width="260" height="36" rx="5" fill="#222" stroke="#333" stroke-width="1"/>
    <rect x="2" y="108" width="254" height="32" rx="4" fill="#e0a030" opacity="0.9"/>
    <text x="128" y="122" text-anchor="middle" fill="#1a1a1a" font-family="sans-serif" font-size="11" font-weight="bold">100% → Munich Dunkel</text>
    <text x="128" y="136" text-anchor="middle" fill="#1a1a1a" font-family="sans-serif" font-size="10">Dyp, rik, brødet øl</text>

    <!-- Color comparison strip -->
    <text x="0" y="162" fill="#888" font-family="sans-serif" font-size="10" font-weight="bold">FARGESAMMENLIGNING:</text>
    <defs>
      <linearGradient id="maltColor" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#f5e090"/>
        <stop offset="25%" stop-color="#e0c060"/>
        <stop offset="50%" stop-color="#c89030"/>
        <stop offset="75%" stop-color="#a06018"/>
        <stop offset="100%" stop-color="#6a3808"/>
      </linearGradient>
    </defs>
    <rect x="0" y="170" width="260" height="22" rx="4" fill="url(#maltColor)"/>
    <text x="0" y="208" fill="#888" font-family="sans-serif" font-size="8">Pilsner</text>
    <text x="55" y="208" fill="#c08020" font-family="sans-serif" font-size="8">Pale Ale</text>
    <text x="118" y="208" fill="#e0a030" font-family="sans-serif" font-size="8" font-weight="bold">Munich</text>
    <text x="180" y="208" fill="#c08020" font-family="sans-serif" font-size="8">Vienna</text>
    <text x="225" y="208" fill="#888" font-family="sans-serif" font-size="8">Crystal</text>
    <!-- Munich marker -->
    <line x1="130" y1="167" x2="130" y2="165" stroke="#e0a030" stroke-width="2"/>
    <polygon points="124,162 130,155 136,162" fill="#e0a030"/>
  </g>

  <!-- Stats panel -->
  <rect x="60" y="345" width="680" height="88" rx="8" stroke="#444" stroke-width="1" fill="#222"/>
  <g transform="translate(80, 362)">
    <text x="0" y="0" fill="#e0a030" font-family="sans-serif" font-size="12" font-weight="bold">FAKTA — MUNICH MALT</text>
    <text x="0" y="22" fill="#999" font-family="sans-serif" font-size="11">Farge: <tspan fill="#e0a030" font-weight="bold">8–10 Lovibond (EBC 16–20)</tspan></text>
    <text x="0" y="42" fill="#999" font-family="sans-serif" font-size="11">Opprinnelse: <tspan fill="#f5f5f5">Bayern, Tyskland</tspan></text>
    <text x="0" y="62" fill="#999" font-family="sans-serif" font-size="11">Type: <tspan fill="#4a90d9">Base/spesialmalt — kan brukes 100%</tspan></text>
    <text x="380" y="22" fill="#999" font-family="sans-serif" font-size="11">Stiler: <tspan fill="#9b6bc7">Märzen, Bock, Vienna Lager, Dunkel</tspan></text>
    <text x="380" y="42" fill="#999" font-family="sans-serif" font-size="11">Enzymer: <tspan fill="#5aaa5a">Tilstrekkelig for selvforsukling</tspan></text>
    <text x="380" y="62" fill="#999" font-family="sans-serif" font-size="11">Melanoidiner: <tspan fill="#e0a030">Høyt innhold — dybde og fylde</tspan></text>
  </g>
</svg>
