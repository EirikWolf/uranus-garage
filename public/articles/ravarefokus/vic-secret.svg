<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <rect width="800" height="450" fill="#1a1a1a"/>
  <text x="400" y="32" text-anchor="middle" fill="#f5f5f5" font-family="sans-serif" font-size="18" font-weight="bold">Vic Secret — Australias hemmelige våpen</text>

  <!-- Australian hop cone -->
  <g transform="translate(80, 55)">
    <ellipse cx="80" cy="140" rx="55" ry="100" fill="#2d4a20" stroke="#5aaa5a" stroke-width="2"/>
    <ellipse cx="80" cy="120" rx="45" ry="75" fill="#3a5a2a" stroke="#5aaa5a" stroke-width="1"/>
    <ellipse cx="80" cy="105" rx="35" ry="55" fill="#4a6a3a" stroke="#5aaa5a" stroke-width="1"/>
    <ellipse cx="80" cy="95" rx="25" ry="35" fill="#5a7a4a"/>
    <line x1="80" y1="35" x2="80" y2="240" stroke="#3a5a20" stroke-width="3"/>
    <!-- Lupulin dots -->
    <circle cx="60" cy="105" r="3" fill="#e0c030" opacity="0.7"/>
    <circle cx="100" cy="120" r="2.5" fill="#e0c030" opacity="0.6"/>
    <circle cx="70" cy="145" r="3" fill="#e0c030" opacity="0.7"/>
    <circle cx="95" cy="95" r="2" fill="#e0c030" opacity="0.5"/>
    <circle cx="65" cy="170" r="2.5" fill="#e0c030" opacity="0.6"/>
    <text x="80" y="265" text-anchor="middle" fill="#5aaa5a" font-family="sans-serif" font-size="14" font-weight="bold">VIC SECRET</text>
    <text x="80" y="285" text-anchor="middle" fill="#999" font-family="sans-serif" font-size="10">Victoria, Australia</text>

    <!-- Australian flag hint -->
    <rect x="55" y="300" width="50" height="30" rx="3" stroke="#4a90d9" stroke-width="1" fill="#1a2a3a"/>
    <text x="80" y="320" text-anchor="middle" fill="#4a90d9" font-family="sans-serif" font-size="18">🇦🇺</text>
  </g>

  <!-- Aroma profile -->
  <g transform="translate(370, 65)">
    <text x="120" y="0" text-anchor="middle" fill="#f5f5f5" font-family="sans-serif" font-size="14" font-weight="bold">AROMAPROFIL</text>

    <g transform="translate(120, 120)">
      <circle cx="0" cy="0" r="18" fill="#5aaa5a" opacity="0.3"/>
      <text x="0" y="4" text-anchor="middle" fill="#5aaa5a" font-family="sans-serif" font-size="7" font-weight="bold">VIC</text>

      <!-- Pineapple (dominant) -->
      <circle cx="0" cy="-70" r="42" fill="#e0c030" opacity="0.15" stroke="#e0c030" stroke-width="2"/>
      <text x="0" y="-78" text-anchor="middle" fill="#e0c030" font-family="sans-serif" font-size="12" font-weight="bold">ANANAS</text>
      <text x="0" y="-62" text-anchor="middle" fill="#c0a020" font-family="sans-serif" font-size="9">Dominerende!</text>

      <!-- Pine/Herbs -->
      <circle cx="75" cy="-25" r="32" fill="#4a90d9" opacity="0.15" stroke="#4a90d9" stroke-width="1.5"/>
      <text x="75" y="-30" text-anchor="middle" fill="#4a90d9" font-family="sans-serif" font-size="11" font-weight="bold">FURU</text>
      <text x="75" y="-15" text-anchor="middle" fill="#3a70b9" font-family="sans-serif" font-size="9">Harpiks, Urter</text>

      <!-- Passion fruit -->
      <circle cx="60" cy="55" r="30" fill="#dd3333" opacity="0.15" stroke="#dd3333" stroke-width="1.5"/>
      <text x="60" y="52" text-anchor="middle" fill="#dd3333" font-family="sans-serif" font-size="11" font-weight="bold">PASJON</text>
      <text x="60" y="67" text-anchor="middle" fill="#bb2222" font-family="sans-serif" font-size="9">Tropisk, Syrlig</text>

      <!-- Stone fruit -->
      <circle cx="-65" cy="-25" r="28" fill="#e0a030" opacity="0.15" stroke="#e0a030" stroke-width="1.5"/>
      <text x="-65" y="-28" text-anchor="middle" fill="#e0a030" font-family="sans-serif" font-size="10" font-weight="bold">STEINFRUKT</text>
      <text x="-65" y="-13" text-anchor="middle" fill="#c08020" font-family="sans-serif" font-size="9">Fersken, Abrikos</text>

      <!-- Herbal -->
      <circle cx="-55" cy="50" r="25" fill="#9b6bc7" opacity="0.15" stroke="#9b6bc7" stroke-width="1.5"/>
      <text x="-55" y="47" text-anchor="middle" fill="#9b6bc7" font-family="sans-serif" font-size="10" font-weight="bold">URTER</text>
      <text x="-55" y="62" text-anchor="middle" fill="#7b4ba7" font-family="sans-serif" font-size="9">Cannabis-aktig</text>
    </g>
  </g>

  <!-- Fun facts panel -->
  <rect x="50" y="340" width="700" height="95" rx="8" stroke="#e0c030" stroke-width="1" fill="#222"/>
  <text x="70" y="363" fill="#e0c030" font-family="sans-serif" font-size="12" font-weight="bold">FUN FACTS & STATS</text>

  <text x="70" y="385" fill="#999" font-family="sans-serif" font-size="11">Alfa-syre: <tspan fill="#dd3333" font-weight="bold">14-17%</tspan> (høy!)</text>
  <text x="70" y="405" fill="#999" font-family="sans-serif" font-size="11">Opprinnelse: <tspan fill="#5aaa5a">Victoria, Australia (2000-tallet)</tspan></text>
  <text x="70" y="425" fill="#999" font-family="sans-serif" font-size="11">Stiler: <tspan fill="#4a90d9">IPA, Pale Ale, NEIPA, Australian Pale</tspan></text>

  <text x="400" y="385" fill="#999" font-family="sans-serif" font-size="11">Gode partnere: <tspan fill="#9b6bc7">Galaxy, Mosaic, Nelson Sauvin</tspan></text>
  <text x="400" y="405" fill="#999" font-family="sans-serif" font-size="11">Hemmelig: <tspan fill="#e0c030">Navnet er bokstavelig — sorten var hemmelig i årevis!</tspan></text>
  <text x="400" y="425" fill="#999" font-family="sans-serif" font-size="11">Bruk: <tspan fill="#dd3333">Dry hop og whirlpool — unngå 60 min kok</tspan></text>
</svg>
