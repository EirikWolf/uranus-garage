<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <rect width="800" height="450" fill="#1a1a1a"/>
  <text x="400" y="32" text-anchor="middle" fill="#f5f5f5" font-family="sans-serif" font-size="18" font-weight="bold">Citra — Aromaprofil og Bruksområder</text>

  <!-- Hop cone illustration -->
  <g transform="translate(80, 60)">
    <ellipse cx="80" cy="140" rx="55" ry="100" fill="#2d4a20" stroke="#5aaa5a" stroke-width="2"/>
    <ellipse cx="80" cy="120" rx="45" ry="75" fill="#3a5a2a" stroke="#5aaa5a" stroke-width="1"/>
    <ellipse cx="80" cy="105" rx="35" ry="55" fill="#4a6a3a" stroke="#5aaa5a" stroke-width="1"/>
    <ellipse cx="80" cy="95" rx="25" ry="35" fill="#5a7a4a"/>
    <line x1="80" y1="35" x2="80" y2="240" stroke="#3a5a20" stroke-width="3"/>
    <!-- Lupulin dots -->
    <circle cx="65" cy="110" r="3" fill="#e0c030" opacity="0.7"/>
    <circle cx="95" cy="125" r="2.5" fill="#e0c030" opacity="0.6"/>
    <circle cx="75" cy="145" r="3" fill="#e0c030" opacity="0.7"/>
    <circle cx="90" cy="100" r="2" fill="#e0c030" opacity="0.5"/>
    <circle cx="70" cy="165" r="2.5" fill="#e0c030" opacity="0.6"/>
    <text x="80" y="270" text-anchor="middle" fill="#5aaa5a" font-family="sans-serif" font-size="14" font-weight="bold">CITRA HOP</text>
    <text x="80" y="290" text-anchor="middle" fill="#999" font-family="sans-serif" font-size="10">Humulus lupulus</text>
  </g>

  <!-- Aroma wheel -->
  <g transform="translate(380, 80)">
    <text x="120" y="0" text-anchor="middle" fill="#f5f5f5" font-family="sans-serif" font-size="14" font-weight="bold">AROMAPROFIL</text>

    <!-- Segments -->
    <g transform="translate(120, 130)">
      <!-- Center -->
      <circle cx="0" cy="0" r="20" fill="#5aaa5a" opacity="0.3"/>
      <text x="0" y="5" text-anchor="middle" fill="#5aaa5a" font-family="sans-serif" font-size="8" font-weight="bold">CITRA</text>

      <!-- Tropical -->
      <circle cx="0" cy="-75" r="40" fill="#e0a030" opacity="0.15" stroke="#e0a030" stroke-width="1.5"/>
      <text x="0" y="-80" text-anchor="middle" fill="#e0a030" font-family="sans-serif" font-size="11" font-weight="bold">TROPISK</text>
      <text x="0" y="-65" text-anchor="middle" fill="#c09020" font-family="sans-serif" font-size="9">Mango, Pasjon, Guava</text>

      <!-- Citrus -->
      <circle cx="70" cy="-35" r="35" fill="#e0c030" opacity="0.15" stroke="#e0c030" stroke-width="1.5"/>
      <text x="70" y="-40" text-anchor="middle" fill="#e0c030" font-family="sans-serif" font-size="11" font-weight="bold">SITRUS</text>
      <text x="70" y="-25" text-anchor="middle" fill="#c0a020" font-family="sans-serif" font-size="9">Grapefrukt, Lime</text>

      <!-- Floral -->
      <circle cx="55" cy="55" r="30" fill="#9b6bc7" opacity="0.15" stroke="#9b6bc7" stroke-width="1.5"/>
      <text x="55" y="52" text-anchor="middle" fill="#9b6bc7" font-family="sans-serif" font-size="11" font-weight="bold">BLOMSTER</text>
      <text x="55" y="67" text-anchor="middle" fill="#7b4ba7" font-family="sans-serif" font-size="9">Lychee, Rose</text>

      <!-- Pine -->
      <circle cx="-65" cy="-30" r="30" fill="#4a90d9" opacity="0.15" stroke="#4a90d9" stroke-width="1.5"/>
      <text x="-65" y="-33" text-anchor="middle" fill="#4a90d9" font-family="sans-serif" font-size="11" font-weight="bold">FURU</text>
      <text x="-65" y="-18" text-anchor="middle" fill="#3a70b9" font-family="sans-serif" font-size="9">Harpiks, Urter</text>

      <!-- Stone fruit -->
      <circle cx="-50" cy="55" r="30" fill="#dd3333" opacity="0.15" stroke="#dd3333" stroke-width="1.5"/>
      <text x="-50" y="52" text-anchor="middle" fill="#dd3333" font-family="sans-serif" font-size="11" font-weight="bold">STEINFRUKT</text>
      <text x="-50" y="67" text-anchor="middle" fill="#bb2222" font-family="sans-serif" font-size="9">Fersken, Melon</text>
    </g>
  </g>

  <!-- Stats panel -->
  <rect x="60" y="330" width="680" height="100" rx="8" stroke="#444" stroke-width="1" fill="#222"/>
  <g transform="translate(80, 350)">
    <text x="0" y="0" fill="#5aaa5a" font-family="sans-serif" font-size="12" font-weight="bold">FAKTA</text>
    <text x="0" y="22" fill="#999" font-family="sans-serif" font-size="11">Alfa-syre: <tspan fill="#dd3333" font-weight="bold">11-13%</tspan></text>
    <text x="0" y="42" fill="#999" font-family="sans-serif" font-size="11">Opprinnelse: <tspan fill="#e0a030">Hop Breeding Company, USA (2007)</tspan></text>
    <text x="0" y="62" fill="#999" font-family="sans-serif" font-size="11">Beste bruk: <tspan fill="#4a90d9">Dry hop, Whirlpool, Late additions</tspan></text>
    <text x="400" y="22" fill="#999" font-family="sans-serif" font-size="11">Stiler: <tspan fill="#5aaa5a">IPA, Pale Ale, NEIPA</tspan></text>
    <text x="400" y="42" fill="#999" font-family="sans-serif" font-size="11">Gode partnere: <tspan fill="#9b6bc7">Mosaic, Galaxy, Simcoe</tspan></text>
    <text x="400" y="62" fill="#999" font-family="sans-serif" font-size="11">Lupulin: <tspan fill="#e0c030">Svært høy olje-innhold</tspan></text>
  </g>
</svg>
