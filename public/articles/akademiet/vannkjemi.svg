<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <rect width="800" height="450" fill="#1a1a1a"/>
  <text x="400" y="30" text-anchor="middle" fill="#f5f5f5" font-family="sans-serif" font-size="18" font-weight="bold">Vannkjemi — Mineraler og Ølstiler</text>

  <!-- Mineral profiles table -->
  <g transform="translate(30, 48)">
    <text x="360" y="0" text-anchor="middle" fill="#f5f5f5" font-family="sans-serif" font-size="13" font-weight="bold">MINERALPROFILER FOR ULIKE STILER (mg/L)</text>

    <!-- Header row -->
    <rect x="0" y="10" width="740" height="24" rx="3" fill="#2a2a2a"/>
    <text x="10" y="26" fill="#888" font-family="sans-serif" font-size="10" font-weight="bold">STIL / BY</text>
    <text x="145" y="26" text-anchor="middle" fill="#4a90d9" font-family="sans-serif" font-size="10" font-weight="bold">Ca²⁺</text>
    <text x="210" y="26" text-anchor="middle" fill="#5aaa5a" font-family="sans-serif" font-size="10" font-weight="bold">Mg²⁺</text>
    <text x="275" y="26" text-anchor="middle" fill="#e0a030" font-family="sans-serif" font-size="10" font-weight="bold">SO₄²⁻</text>
    <text x="345" y="26" text-anchor="middle" fill="#9b6bc7" font-family="sans-serif" font-size="10" font-weight="bold">Cl⁻</text>
    <text x="415" y="26" text-anchor="middle" fill="#dd3333" font-family="sans-serif" font-size="10" font-weight="bold">HCO₃⁻</text>
    <text x="490" y="26" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="10" font-weight="bold">Na⁺</text>
    <text x="580" y="26" text-anchor="middle" fill="#f5f5f5" font-family="sans-serif" font-size="10" font-weight="bold">Karakter</text>

    <!-- Pilsen row -->
    <rect x="0" y="36" width="740" height="28" rx="2" fill="#1e2a1e"/>
    <text x="10" y="54" fill="#4a90d9" font-family="sans-serif" font-size="10" font-weight="bold">Pilsner (Plzeň)</text>
    <text x="145" y="54" text-anchor="middle" fill="#f5f5f5" font-family="sans-serif" font-size="10">7</text>
    <text x="210" y="54" text-anchor="middle" fill="#f5f5f5" font-family="sans-serif" font-size="10">3</text>
    <text x="275" y="54" text-anchor="middle" fill="#f5f5f5" font-family="sans-serif" font-size="10">5</text>
    <text x="345" y="54" text-anchor="middle" fill="#f5f5f5" font-family="sans-serif" font-size="10">5</text>
    <text x="415" y="54" text-anchor="middle" fill="#f5f5f5" font-family="sans-serif" font-size="10">15</text>
    <text x="490" y="54" text-anchor="middle" fill="#f5f5f5" font-family="sans-serif" font-size="10">3</text>
    <text x="580" y="54" text-anchor="middle" fill="#4a90d9" font-family="sans-serif" font-size="10">Svært myk, lys</text>

    <!-- Burton row -->
    <rect x="0" y="66" width="740" height="28" rx="2" fill="#2a2010"/>
    <text x="10" y="84" fill="#e0a030" font-family="sans-serif" font-size="10" font-weight="bold">IPA (Burton-on-Trent)</text>
    <text x="145" y="84" text-anchor="middle" fill="#f5f5f5" font-family="sans-serif" font-size="10">275</text>
    <text x="210" y="84" text-anchor="middle" fill="#f5f5f5" font-family="sans-serif" font-size="10">40</text>
    <text x="275" y="84" text-anchor="middle" fill="#e0a030" font-family="sans-serif" font-size="10" font-weight="bold">725</text>
    <text x="345" y="84" text-anchor="middle" fill="#f5f5f5" font-family="sans-serif" font-size="10">35</text>
    <text x="415" y="84" text-anchor="middle" fill="#f5f5f5" font-family="sans-serif" font-size="10">270</text>
    <text x="490" y="84" text-anchor="middle" fill="#f5f5f5" font-family="sans-serif" font-size="10">30</text>
    <text x="580" y="84" text-anchor="middle" fill="#e0a030" font-family="sans-serif" font-size="10">Tørr, bitter, hard</text>

    <!-- Dublin row -->
    <rect x="0" y="96" width="740" height="28" rx="2" fill="#1a1a2a"/>
    <text x="10" y="114" fill="#9b6bc7" font-family="sans-serif" font-size="10" font-weight="bold">Stout (Dublin)</text>
    <text x="145" y="114" text-anchor="middle" fill="#f5f5f5" font-family="sans-serif" font-size="10">115</text>
    <text x="210" y="114" text-anchor="middle" fill="#f5f5f5" font-family="sans-serif" font-size="10">4</text>
    <text x="275" y="114" text-anchor="middle" fill="#f5f5f5" font-family="sans-serif" font-size="10">55</text>
    <text x="345" y="114" text-anchor="middle" fill="#9b6bc7" font-family="sans-serif" font-size="10" font-weight="bold">19</text>
    <text x="415" y="114" text-anchor="middle" fill="#dd3333" font-family="sans-serif" font-size="10" font-weight="bold">320</text>
    <text x="490" y="114" text-anchor="middle" fill="#f5f5f5" font-family="sans-serif" font-size="10">12</text>
    <text x="580" y="114" text-anchor="middle" fill="#9b6bc7" font-family="sans-serif" font-size="10">Malt, rund, mørk</text>

    <!-- Munich row -->
    <rect x="0" y="126" width="740" height="28" rx="2" fill="#201a10"/>
    <text x="10" y="144" fill="#5aaa5a" font-family="sans-serif" font-size="10" font-weight="bold">Lager (München)</text>
    <text x="145" y="144" text-anchor="middle" fill="#f5f5f5" font-family="sans-serif" font-size="10">75</text>
    <text x="210" y="144" text-anchor="middle" fill="#f5f5f5" font-family="sans-serif" font-size="10">17</text>
    <text x="275" y="144" text-anchor="middle" fill="#f5f5f5" font-family="sans-serif" font-size="10">10</text>
    <text x="345" y="144" text-anchor="middle" fill="#f5f5f5" font-family="sans-serif" font-size="10">2</text>
    <text x="415" y="144" text-anchor="middle" fill="#f5f5f5" font-family="sans-serif" font-size="10">150</text>
    <text x="490" y="144" text-anchor="middle" fill="#f5f5f5" font-family="sans-serif" font-size="10">2</text>
    <text x="580" y="144" text-anchor="middle" fill="#5aaa5a" font-family="sans-serif" font-size="10">Myk, maltfylt</text>
  </g>

  <!-- SO4/Cl ratio diagram -->
  <g transform="translate(30, 250)">
    <text x="200" y="0" text-anchor="middle" fill="#f5f5f5" font-family="sans-serif" font-size="12" font-weight="bold">SO₄/Cl-FORHOLDET — BITTER vs MALT</text>

    <defs>
      <linearGradient id="bitterMalt" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#9b6bc7"/>
        <stop offset="40%" stop-color="#5aaa5a"/>
        <stop offset="70%" stop-color="#e0a030"/>
        <stop offset="100%" stop-color="#dd3333"/>
      </linearGradient>
    </defs>
    <rect x="0" y="15" width="400" height="28" rx="5" fill="url(#bitterMalt)" opacity="0.8"/>
    <text x="0" y="58" fill="#9b6bc7" font-family="sans-serif" font-size="9">Malt-fremhevet</text>
    <text x="155" y="58" text-anchor="middle" fill="#5aaa5a" font-family="sans-serif" font-size="9">Balansert</text>
    <text x="310" y="58" text-anchor="middle" fill="#e0a030" font-family="sans-serif" font-size="9">Bitter-fremhevet</text>
    <text x="400" y="58" text-anchor="end" fill="#dd3333" font-family="sans-serif" font-size="9">Svært bitter</text>
    <text x="0" y="72" fill="#888" font-family="sans-serif" font-size="8">SO₄:Cl &lt; 0.5</text>
    <text x="155" y="72" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="8">SO₄:Cl ~1:1</text>
    <text x="310" y="72" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="8">SO₄:Cl 2–4:1</text>
    <text x="400" y="72" text-anchor="end" fill="#888" font-family="sans-serif" font-size="8">SO₄:Cl &gt; 4:1</text>
  </g>

  <!-- Key minerals reference -->
  <g transform="translate(460, 250)">
    <text x="155" y="0" text-anchor="middle" fill="#f5f5f5" font-family="sans-serif" font-size="12" font-weight="bold">NØKKELMINERALER</text>
    <rect x="0" y="10" width="310" height="22" rx="3" fill="#222" stroke="#4a90d9" stroke-width="1"/>
    <text x="8" y="25" fill="#4a90d9" font-family="sans-serif" font-size="10" font-weight="bold">Ca²⁺</text>
    <text x="40" y="25" fill="#888" font-family="sans-serif" font-size="10">Enzymaktivitet, gjærflokkulering, klarhet</text>
    <rect x="0" y="35" width="310" height="22" rx="3" fill="#222" stroke="#e0a030" stroke-width="1"/>
    <text x="8" y="50" fill="#e0a030" font-family="sans-serif" font-size="10" font-weight="bold">SO₄²⁻</text>
    <text x="40" y="50" fill="#888" font-family="sans-serif" font-size="10">Fremhever humle-bitterhet, tørrhet</text>
    <rect x="0" y="60" width="310" height="22" rx="3" fill="#222" stroke="#9b6bc7" stroke-width="1"/>
    <text x="8" y="75" fill="#9b6bc7" font-family="sans-serif" font-size="10" font-weight="bold">Cl⁻</text>
    <text x="40" y="75" fill="#888" font-family="sans-serif" font-size="10">Fremhever maltsødme, rundhet, fylde</text>
    <rect x="0" y="85" width="310" height="22" rx="3" fill="#222" stroke="#dd3333" stroke-width="1"/>
    <text x="8" y="100" fill="#dd3333" font-family="sans-serif" font-size="10" font-weight="bold">HCO₃⁻</text>
    <text x="40" y="100" fill="#888" font-family="sans-serif" font-size="10">Øker pH — brukes for mørke øltyper</text>
    <rect x="0" y="110" width="310" height="22" rx="3" fill="#222" stroke="#5aaa5a" stroke-width="1"/>
    <text x="8" y="125" fill="#5aaa5a" font-family="sans-serif" font-size="10" font-weight="bold">Mg²⁺</text>
    <text x="40" y="125" fill="#888" font-family="sans-serif" font-size="10">Gjær-næring, bittert i høye mengder</text>
  </g>

  <!-- Stats bar -->
  <rect x="30" y="385" width="740" height="52" rx="8" stroke="#444" stroke-width="1" fill="#222"/>
  <g transform="translate(50, 400)">
    <text x="0" y="0" fill="#4a90d9" font-family="sans-serif" font-size="11" font-weight="bold">MÅLVERDIER:</text>
    <text x="110" y="0" fill="#888" font-family="sans-serif" font-size="10">Ca: <tspan fill="#4a90d9">50–150 mg/L</tspan></text>
    <text x="240" y="0" fill="#888" font-family="sans-serif" font-size="10">Mg: <tspan fill="#5aaa5a">&lt;30 mg/L</tspan></text>
    <text x="350" y="0" fill="#888" font-family="sans-serif" font-size="10">SO₄: <tspan fill="#e0a030">50–400 mg/L</tspan></text>
    <text x="490" y="0" fill="#888" font-family="sans-serif" font-size="10">Cl: <tspan fill="#9b6bc7">0–250 mg/L</tspan></text>
    <text x="610" y="0" fill="#888" font-family="sans-serif" font-size="10">Na: <tspan fill="#888">&lt;150 mg/L</tspan></text>
    <text x="0" y="22" fill="#888" font-family="sans-serif" font-size="10">Verktøy: <tspan fill="#5aaa5a">Brewfather vannkjemi, Bru'n Water (gratis Excel)</tspan></text>
    <text x="400" y="22" fill="#888" font-family="sans-serif" font-size="10">pH-mål mesk: <tspan fill="#5aaa5a">5.2–5.6</tspan></text>
  </g>
</svg>
