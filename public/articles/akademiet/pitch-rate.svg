<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <rect width="800" height="450" fill="#1a1a1a"/>
  <text x="400" y="28" text-anchor="middle" fill="#f5f5f5" font-family="sans-serif" font-size="17" font-weight="bold">Pitch Rate — Gjærceller og ølkvalitet</text>

  <!-- Formula box -->
  <rect x="30" y="45" width="340" height="70" rx="6" fill="#1e1e2e"/>
  <text x="200" y="68" text-anchor="middle" fill="#9b6bc7" font-family="sans-serif" font-size="11" font-weight="bold">FORMEL</text>
  <text x="200" y="90" text-anchor="middle" fill="#f5f5f5" font-family="sans-serif" font-size="12">Celler = Pitch Rate × Volum (mL) × °Plato</text>
  <text x="200" y="107" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="10">Ale: 0,75 mill/mL/°P  |  Lager: 1,5 mill/mL/°P</text>

  <!-- Example box -->
  <rect x="430" y="45" width="340" height="70" rx="6" fill="#1e2a1e"/>
  <text x="600" y="68" text-anchor="middle" fill="#5aaa5a" font-family="sans-serif" font-size="11" font-weight="bold">EKSEMPEL — 25L ALE OG 1.050</text>
  <text x="600" y="88" text-anchor="middle" fill="#f5f5f5" font-family="sans-serif" font-size="12">0,75 × 25 000 × 12,4 ≈ 233 mrd celler</text>
  <text x="600" y="106" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="10">→ 1 pose tørrgjær (200–230 mrd) = tilstrekkelig</text>

  <!-- Dry yeast table -->
  <g transform="translate(30, 130)">
    <text x="170" y="0" text-anchor="middle" fill="#e0a030" font-family="sans-serif" font-size="12" font-weight="bold">TØRRGJÆR — Tommelfingerregler</text>
    <rect x="0" y="10" width="340" height="22" rx="3" fill="#2a2a2a"/>
    <text x="10" y="25" fill="#888" font-family="sans-serif" font-size="10" font-weight="bold">SITUASJON</text>
    <text x="240" y="25" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="10" font-weight="bold">POSE(R)</text>
    <text x="320" y="25" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="10" font-weight="bold">CELLER</text>

    <rect x="0" y="34" width="340" height="26" rx="2" fill="#1e2a1e"/>
    <text x="10" y="51" fill="#f5f5f5" font-family="sans-serif" font-size="10">Standard ale, 20–25 L, OG &lt; 1.065</text>
    <text x="240" y="51" text-anchor="middle" fill="#5aaa5a" font-family="sans-serif" font-size="11" font-weight="bold">1</text>
    <text x="320" y="51" text-anchor="middle" fill="#5aaa5a" font-family="sans-serif" font-size="10">200–230 mrd</text>

    <rect x="0" y="62" width="340" height="26" rx="2" fill="#1e1e1e"/>
    <text x="10" y="79" fill="#f5f5f5" font-family="sans-serif" font-size="10">Høygravitets ale, OG 1.065–1.080</text>
    <text x="240" y="79" text-anchor="middle" fill="#e0a030" font-family="sans-serif" font-size="11" font-weight="bold">2</text>
    <text x="320" y="79" text-anchor="middle" fill="#e0a030" font-family="sans-serif" font-size="10">400–460 mrd</text>

    <rect x="0" y="90" width="340" height="26" rx="2" fill="#2a1a1a"/>
    <text x="10" y="107" fill="#f5f5f5" font-family="sans-serif" font-size="10">Imperial / belgisk, OG &gt; 1.080</text>
    <text x="240" y="107" text-anchor="middle" fill="#dd3333" font-family="sans-serif" font-size="11" font-weight="bold">3+</text>
    <text x="320" y="107" text-anchor="middle" fill="#dd3333" font-family="sans-serif" font-size="10">600+ mrd</text>

    <rect x="0" y="118" width="340" height="26" rx="2" fill="#1a1e2a"/>
    <text x="10" y="135" fill="#f5f5f5" font-family="sans-serif" font-size="10">Lager, 25 L, OG 1.050</text>
    <text x="240" y="135" text-anchor="middle" fill="#4a90d9" font-family="sans-serif" font-size="11" font-weight="bold">2</text>
    <text x="320" y="135" text-anchor="middle" fill="#4a90d9" font-family="sans-serif" font-size="10">400–460 mrd</text>

    <rect x="0" y="146" width="340" height="26" rx="2" fill="#1e1e2e"/>
    <text x="10" y="163" fill="#f5f5f5" font-family="sans-serif" font-size="10">Flytende gjær (1 pakke)</text>
    <text x="240" y="163" text-anchor="middle" fill="#dd3333" font-family="sans-serif" font-size="10">Bruk starter</text>
    <text x="320" y="163" text-anchor="middle" fill="#dd3333" font-family="sans-serif" font-size="10">~100 mrd</text>
  </g>

  <!-- Starter box -->
  <g transform="translate(430, 130)">
    <text x="170" y="0" text-anchor="middle" fill="#4a90d9" font-family="sans-serif" font-size="12" font-weight="bold">GJÆRSTARTER — 1 L</text>
    <rect x="0" y="10" width="340" height="180" rx="6" fill="#1a1a2a"/>
    <text x="15" y="34" fill="#888" font-family="sans-serif" font-size="10">Ingredienser:</text>
    <text x="15" y="50" fill="#f5f5f5" font-family="sans-serif" font-size="10">• 100 g DME (tørrmaltext) per liter vann</text>
    <text x="15" y="66" fill="#f5f5f5" font-family="sans-serif" font-size="10">• Kok, kjøl til romtemperatur</text>
    <text x="15" y="82" fill="#f5f5f5" font-family="sans-serif" font-size="10">• Tilsett gjæren, rør jevnlig</text>

    <rect x="15" y="94" width="310" height="1" fill="#333"/>
    <text x="15" y="112" fill="#888" font-family="sans-serif" font-size="10">Resultat:</text>
    <text x="15" y="128" fill="#5aaa5a" font-family="sans-serif" font-size="10">✓ Dobling av celleantall på 18–24 t</text>
    <text x="15" y="144" fill="#5aaa5a" font-family="sans-serif" font-size="10">✓ 1 pakke → ~200 mrd etter 1 L starter</text>
    <text x="15" y="160" fill="#888" font-family="sans-serif" font-size="10">  Cold crash → dekanteringer → pitch slurry</text>
  </g>

  <!-- Under/Over pitching effects -->
  <g transform="translate(30, 330)">
    <rect x="0" y="0" width="365" height="90" rx="6" fill="#2a1010"/>
    <text x="15" y="20" fill="#dd3333" font-family="sans-serif" font-size="11" font-weight="bold">⚠ FOR LITE GJÆR (underpitching)</text>
    <text x="15" y="38" fill="#888" font-family="sans-serif" font-size="10">Gjæren stresses → off-flavors:</text>
    <text x="15" y="54" fill="#f5f5f5" font-family="sans-serif" font-size="10">• Diacetyl (smør)  • Acetaldehyd (grønt eple)  • Fusel (varme, løsemiddel)</text>
    <text x="15" y="72" fill="#888" font-family="sans-serif" font-size="10">Forsvinner sjelden helt, selv med lang kondisjonering</text>
  </g>

  <g transform="translate(405, 330)">
    <rect x="0" y="0" width="365" height="90" rx="6" fill="#1e2a10"/>
    <text x="15" y="20" fill="#e0a030" font-family="sans-serif" font-size="11" font-weight="bold">⚠ FOR MYE GJÆR (overpitching)</text>
    <text x="15" y="38" fill="#888" font-family="sans-serif" font-size="10">Flatt, gjærpreget øl — mangler karakter</text>
    <text x="15" y="54" fill="#f5f5f5" font-family="sans-serif" font-size="10">• Viktig for belgisk ale, hefeweizen, kveik</text>
    <text x="15" y="72" fill="#888" font-family="sans-serif" font-size="10">  Estere/fenoler fra gjæren er en del av stilen</text>
  </g>

  <text x="400" y="438" text-anchor="middle" fill="#555" font-family="sans-serif" font-size="10">Sjekk pakkedato: flytende gjær eldre enn 3 måneder har merkbart lavere levedyktighet</text>
</svg>
