<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <rect width="800" height="450" fill="#1a1a1a"/>
  <text x="400" y="30" text-anchor="middle" fill="#f5f5f5" font-family="sans-serif" font-size="18" font-weight="bold">Kom i Gang med Hjemmebrygging</text>

  <!-- Flow steps -->
  <!-- Step 1: MESK -->
  <g transform="translate(40, 60)">
    <rect x="0" y="0" width="110" height="130" rx="8" fill="#222" stroke="#e0a030" stroke-width="2"/>
    <text x="55" y="18" text-anchor="middle" fill="#e0a030" font-family="sans-serif" font-size="13" font-weight="bold">MESK</text>
    <!-- Kettle icon -->
    <rect x="20" y="28" width="70" height="55" rx="6" fill="#2d2820" stroke="#e0a030" stroke-width="1.5"/>
    <rect x="28" y="35" width="54" height="40" rx="3" fill="#3d3015" opacity="0.8"/>
    <rect x="15" y="26" width="80" height="8" rx="3" fill="#e0a030" opacity="0.5"/>
    <!-- Steam lines -->
    <path d="M35 28 Q32 20 35 14" stroke="#4a90d9" stroke-width="1.5" fill="none" opacity="0.7"/>
    <path d="M55 28 Q52 20 55 14" stroke="#4a90d9" stroke-width="1.5" fill="none" opacity="0.7"/>
    <path d="M75 28 Q72 20 75 14" stroke="#4a90d9" stroke-width="1.5" fill="none" opacity="0.7"/>
    <text x="55" y="100" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="9">65–72°C</text>
    <text x="55" y="113" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="9">60–90 min</text>
    <text x="55" y="126" text-anchor="middle" fill="#5aaa5a" font-family="sans-serif" font-size="9">Sukkere dannes</text>
  </g>

  <!-- Arrow -->
  <path d="M152 125 L172 125" stroke="#555" stroke-width="2" marker-end="url(#arr1)"/>
  <defs>
    <marker id="arr1" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- Step 2: KOK -->
  <g transform="translate(174, 60)">
    <rect x="0" y="0" width="110" height="130" rx="8" fill="#222" stroke="#dd3333" stroke-width="2"/>
    <text x="55" y="18" text-anchor="middle" fill="#dd3333" font-family="sans-serif" font-size="13" font-weight="bold">KOK</text>
    <!-- Boiling kettle -->
    <rect x="18" y="28" width="74" height="55" rx="6" fill="#2d1a1a" stroke="#dd3333" stroke-width="1.5"/>
    <rect x="26" y="40" width="58" height="36" rx="3" fill="#3d2020" opacity="0.8"/>
    <!-- Bubbles -->
    <circle cx="40" cy="55" r="4" fill="#dd3333" opacity="0.4"/>
    <circle cx="58" cy="48" r="3" fill="#dd3333" opacity="0.3"/>
    <circle cx="72" cy="58" r="4" fill="#dd3333" opacity="0.4"/>
    <!-- Hop pellets -->
    <rect x="44" y="44" width="8" height="5" rx="1" fill="#5aaa5a" opacity="0.8"/>
    <rect x="60" y="50" width="8" height="5" rx="1" fill="#5aaa5a" opacity="0.8"/>
    <text x="55" y="100" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="9">100°C</text>
    <text x="55" y="113" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="9">60–90 min</text>
    <text x="55" y="126" text-anchor="middle" fill="#5aaa5a" font-family="sans-serif" font-size="9">Humle tilsettes</text>
  </g>

  <!-- Arrow -->
  <path d="M286 125 L306 125" stroke="#555" stroke-width="2" marker-end="url(#arr1)"/>

  <!-- Step 3: KJØL -->
  <g transform="translate(308, 60)">
    <rect x="0" y="0" width="110" height="130" rx="8" fill="#222" stroke="#4a90d9" stroke-width="2"/>
    <text x="55" y="18" text-anchor="middle" fill="#4a90d9" font-family="sans-serif" font-size="13" font-weight="bold">KJØL</text>
    <!-- Chiller coil -->
    <ellipse cx="55" cy="60" rx="30" ry="28" fill="none" stroke="#4a90d9" stroke-width="2.5"/>
    <ellipse cx="55" cy="60" rx="20" ry="18" fill="none" stroke="#4a90d9" stroke-width="2" opacity="0.7"/>
    <ellipse cx="55" cy="60" rx="10" ry="8" fill="none" stroke="#4a90d9" stroke-width="1.5" opacity="0.5"/>
    <!-- Thermometer -->
    <rect x="82" y="35" width="8" height="30" rx="4" fill="#333" stroke="#888" stroke-width="1"/>
    <circle cx="86" cy="67" r="5" fill="#dd3333"/>
    <rect x="84" y="50" width="4" height="17" rx="2" fill="#dd3333"/>
    <text x="55" y="100" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="9">→ 18–22°C</text>
    <text x="55" y="113" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="9">15–30 min</text>
    <text x="55" y="126" text-anchor="middle" fill="#5aaa5a" font-family="sans-serif" font-size="9">Klar for gjær</text>
  </g>

  <!-- Arrow -->
  <path d="M420 125 L440 125" stroke="#555" stroke-width="2" marker-end="url(#arr1)"/>

  <!-- Step 4: GJÆR -->
  <g transform="translate(442, 60)">
    <rect x="0" y="0" width="110" height="130" rx="8" fill="#222" stroke="#9b6bc7" stroke-width="2"/>
    <text x="55" y="18" text-anchor="middle" fill="#9b6bc7" font-family="sans-serif" font-size="13" font-weight="bold">GJÆR</text>
    <!-- Fermenter -->
    <rect x="20" y="28" width="70" height="60" rx="8" fill="#2d2035" stroke="#9b6bc7" stroke-width="1.5"/>
    <!-- Liquid level -->
    <rect x="22" y="50" width="66" height="36" rx="6" fill="#3d2a4a" opacity="0.7"/>
    <!-- CO2 bubbles -->
    <circle cx="38" cy="45" r="3" fill="#9b6bc7" opacity="0.5"/>
    <circle cx="55" cy="40" r="2.5" fill="#9b6bc7" opacity="0.4"/>
    <circle cx="72" cy="43" r="3" fill="#9b6bc7" opacity="0.5"/>
    <!-- Airlock -->
    <rect x="48" y="22" width="14" height="8" rx="3" fill="#888" stroke="#666" stroke-width="1"/>
    <text x="55" y="102" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="9">18–22°C</text>
    <text x="55" y="115" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="9">1–2 uker</text>
    <text x="55" y="128" text-anchor="middle" fill="#5aaa5a" font-family="sans-serif" font-size="9">Alkohol dannes</text>
  </g>

  <!-- Arrow -->
  <path d="M554 125 L574 125" stroke="#555" stroke-width="2" marker-end="url(#arr1)"/>

  <!-- Step 5: TAPP -->
  <g transform="translate(576, 60)">
    <rect x="0" y="0" width="110" height="130" rx="8" fill="#222" stroke="#5aaa5a" stroke-width="2"/>
    <text x="55" y="18" text-anchor="middle" fill="#5aaa5a" font-family="sans-serif" font-size="13" font-weight="bold">TAPP</text>
    <!-- Bottles -->
    <rect x="22" y="35" width="18" height="50" rx="5" fill="#2d4020" stroke="#5aaa5a" stroke-width="1.5"/>
    <rect x="20" y="30" width="22" height="8" rx="3" fill="#3a5028"/>
    <rect x="46" y="35" width="18" height="50" rx="5" fill="#2d4020" stroke="#5aaa5a" stroke-width="1.5"/>
    <rect x="44" y="30" width="22" height="8" rx="3" fill="#3a5028"/>
    <rect x="70" y="35" width="18" height="50" rx="5" fill="#2d4020" stroke="#5aaa5a" stroke-width="1.5"/>
    <rect x="68" y="30" width="22" height="8" rx="3" fill="#3a5028"/>
    <!-- Caps -->
    <rect x="21" y="26" width="20" height="5" rx="2" fill="#e0a030"/>
    <rect x="45" y="26" width="20" height="5" rx="2" fill="#e0a030"/>
    <rect x="69" y="26" width="20" height="5" rx="2" fill="#e0a030"/>
    <text x="55" y="100" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="9">+ sukker</text>
    <text x="55" y="113" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="9">2 uker</text>
    <text x="55" y="126" text-anchor="middle" fill="#5aaa5a" font-family="sans-serif" font-size="9">Karbonering</text>
  </g>

  <!-- Timeline bar -->
  <rect x="40" y="215" width="720" height="50" rx="8" fill="#222" stroke="#333" stroke-width="1"/>
  <text x="400" y="232" text-anchor="middle" fill="#f5f5f5" font-family="sans-serif" font-size="11" font-weight="bold">TIDSLINJE</text>
  <rect x="50" y="238" width="115" height="18" rx="4" fill="#e0a030" opacity="0.7"/>
  <text x="107" y="251" text-anchor="middle" fill="#1a1a1a" font-family="sans-serif" font-size="9" font-weight="bold">Bryggedag (4–6t)</text>
  <rect x="175" y="238" width="175" height="18" rx="4" fill="#9b6bc7" opacity="0.7"/>
  <text x="262" y="251" text-anchor="middle" fill="#f5f5f5" font-family="sans-serif" font-size="9" font-weight="bold">Gjæring (1–2 uker)</text>
  <rect x="360" y="238" width="175" height="18" rx="4" fill="#4a90d9" opacity="0.7"/>
  <text x="447" y="251" text-anchor="middle" fill="#f5f5f5" font-family="sans-serif" font-size="9" font-weight="bold">Karbonering (2 uker)</text>
  <rect x="545" y="238" width="210" height="18" rx="4" fill="#5aaa5a" opacity="0.7"/>
  <text x="650" y="251" text-anchor="middle" fill="#1a1a1a" font-family="sans-serif" font-size="9" font-weight="bold">DRIKK! (og brygge igjen)</text>

  <!-- Equipment list -->
  <rect x="40" y="280" width="720" height="150" rx="8" fill="#222" stroke="#333" stroke-width="1"/>
  <text x="60" y="300" fill="#f5f5f5" font-family="sans-serif" font-size="12" font-weight="bold">UTSTYR DU TRENGER:</text>
  <g transform="translate(60, 312)">
    <rect x="0" y="0" width="10" height="10" rx="2" fill="#e0a030"/>
    <text x="16" y="10" fill="#999" font-family="sans-serif" font-size="11">Bryggekjele (20–30L)</text>
    <rect x="0" y="18" width="10" height="10" rx="2" fill="#e0a030"/>
    <text x="16" y="28" fill="#999" font-family="sans-serif" font-size="11">Meskepose eller meskekjele med sil</text>
    <rect x="0" y="36" width="10" height="10" rx="2" fill="#e0a030"/>
    <text x="16" y="46" fill="#999" font-family="sans-serif" font-size="11">Termometer (digital anbefalt)</text>
    <rect x="0" y="54" width="10" height="10" rx="2" fill="#e0a030"/>
    <text x="16" y="64" fill="#999" font-family="sans-serif" font-size="11">Fermenterings-bøtte eller -tank (30L)</text>
    <rect x="0" y="72" width="10" height="10" rx="2" fill="#e0a030"/>
    <text x="16" y="82" fill="#999" font-family="sans-serif" font-size="11">Airlock og gjærings-propp</text>
    <rect x="0" y="90" width="10" height="10" rx="2" fill="#e0a030"/>
    <text x="16" y="100" fill="#999" font-family="sans-serif" font-size="11">Flasker, kapsel og tappeutstyr</text>
  </g>
  <g transform="translate(360, 312)">
    <rect x="0" y="0" width="10" height="10" rx="2" fill="#5aaa5a"/>
    <text x="16" y="10" fill="#999" font-family="sans-serif" font-size="11">Hydrommeter (for å måle OG/FG)</text>
    <rect x="0" y="18" width="10" height="10" rx="2" fill="#5aaa5a"/>
    <text x="16" y="28" fill="#999" font-family="sans-serif" font-size="11">Kjølevifte / immersion chiller</text>
    <rect x="0" y="36" width="10" height="10" rx="2" fill="#5aaa5a"/>
    <text x="16" y="46" fill="#999" font-family="sans-serif" font-size="11">Desinfeksjonsmiddel (Star San)</text>
    <rect x="0" y="54" width="10" height="10" rx="2" fill="#5aaa5a"/>
    <text x="16" y="64" fill="#999" font-family="sans-serif" font-size="11">Slangesett for overføring</text>
    <rect x="0" y="72" width="10" height="10" rx="2" fill="#5aaa5a"/>
    <text x="16" y="82" fill="#999" font-family="sans-serif" font-size="11">Bryggeprogramvare (Brewfather)</text>
  </g>
</svg>
