<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <rect width="800" height="450" fill="#1a1a1a"/>
  <text x="400" y="28" text-anchor="middle" fill="#f5f5f5" font-family="sans-serif" font-size="17" font-weight="bold">Karbonering — Metoder og CO₂-volum per ølstil</text>

  <!-- Natural carbonation -->
  <g transform="translate(30, 48)">
    <rect x="0" y="0" width="350" height="260" rx="6" fill="#1e2a1e"/>
    <text x="175" y="24" text-anchor="middle" fill="#5aaa5a" font-family="sans-serif" font-size="13" font-weight="bold">🍾 NATURLIG KARBONERING</text>
    <text x="175" y="42" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="10">Primingssukker i flasken/fatet</text>
    <rect x="15" y="50" width="320" height="1" fill="#2a3a2a"/>

    <!-- Sugar amounts table -->
    <text x="15" y="70" fill="#888" font-family="sans-serif" font-size="10" font-weight="bold">STIL</text>
    <text x="230" y="70" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="10" font-weight="bold">GRAM SUKKER/L</text>
    <text x="320" y="70" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="10" font-weight="bold">TID</text>

    <rect x="0" y="75" width="350" height="24" rx="2" fill="#1a2a1a"/>
    <text x="15" y="91" fill="#f5f5f5" font-family="sans-serif" font-size="10">Britiske stiler (bitter, stout)</text>
    <text x="230" y="91" text-anchor="middle" fill="#4a90d9" font-family="sans-serif" font-size="11" font-weight="bold">5–6 g</text>
    <text x="320" y="91" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="10">2–3 uker</text>

    <rect x="0" y="101" width="350" height="24" rx="2" fill="#1e2e1e"/>
    <text x="15" y="117" fill="#f5f5f5" font-family="sans-serif" font-size="10">Standard ale / lager</text>
    <text x="230" y="117" text-anchor="middle" fill="#5aaa5a" font-family="sans-serif" font-size="11" font-weight="bold">6–8 g</text>
    <text x="320" y="117" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="10">2–3 uker</text>

    <rect x="0" y="127" width="350" height="24" rx="2" fill="#1a2a1a"/>
    <text x="15" y="143" fill="#f5f5f5" font-family="sans-serif" font-size="10">Belgisk / hefeweizen</text>
    <text x="230" y="143" text-anchor="middle" fill="#e0a030" font-family="sans-serif" font-size="11" font-weight="bold">9–10 g</text>
    <text x="320" y="143" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="10">2–4 uker</text>

    <rect x="15" y="158" width="320" height="1" fill="#2a3a2a"/>
    <text x="15" y="176" fill="#888" font-family="sans-serif" font-size="10">✓ Karboner ved 18–22 °C</text>
    <text x="15" y="192" fill="#888" font-family="sans-serif" font-size="10">✓ Mål stabil FG FØR flasking</text>
    <text x="15" y="208" fill="#dd3333" font-family="sans-serif" font-size="10">⚠ Bottling for tidlig = EKSPLOSJON</text>
    <text x="15" y="224" fill="#888" font-family="sans-serif" font-size="10">  To identiske avlesninger 48 t fra hverandre</text>
    <text x="15" y="240" fill="#888" font-family="sans-serif" font-size="10">  Bland sukkerlake grundig i hele batchen</text>
  </g>

  <!-- Forced carbonation -->
  <g transform="translate(420, 48)">
    <rect x="0" y="0" width="350" height="260" rx="6" fill="#1a1a2a"/>
    <text x="175" y="24" text-anchor="middle" fill="#4a90d9" font-family="sans-serif" font-size="13" font-weight="bold">🪣 TVUNGEN KARBONERING</text>
    <text x="175" y="42" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="10">CO₂-flaske + Cornelius-fat</text>
    <rect x="15" y="50" width="320" height="1" fill="#2a2a3a"/>

    <text x="15" y="70" fill="#888" font-family="sans-serif" font-size="10" font-weight="bold">METODE</text>
    <text x="230" y="70" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="10" font-weight="bold">TRYKK / TID</text>

    <rect x="0" y="75" width="350" height="24" rx="2" fill="#1a1a2a"/>
    <text x="15" y="91" fill="#f5f5f5" font-family="sans-serif" font-size="10">Standard (sett og glem)</text>
    <text x="230" y="91" text-anchor="middle" fill="#5aaa5a" font-family="sans-serif" font-size="10" font-weight="bold">10–15 PSI / 5–7 d</text>

    <rect x="0" y="101" width="350" height="24" rx="2" fill="#1e1e2e"/>
    <text x="15" y="117" fill="#f5f5f5" font-family="sans-serif" font-size="10">Force carb (rask)</text>
    <text x="230" y="117" text-anchor="middle" fill="#e0a030" font-family="sans-serif" font-size="10" font-weight="bold">30 PSI / 24 t + risting</text>

    <rect x="15" y="132" width="320" height="1" fill="#2a2a3a"/>
    <text x="15" y="150" fill="#5aaa5a" font-family="sans-serif" font-size="10">✓ Bruk karboneringstabell (PSI vs. °C)</text>
    <text x="15" y="166" fill="#5aaa5a" font-family="sans-serif" font-size="10">✓ Fatet MÅ være kaldt før du setter trykk</text>
    <text x="15" y="182" fill="#dd3333" font-family="sans-serif" font-size="10">⚠ Aldri karboner varmt øl → kjøl ned</text>
    <text x="15" y="198" fill="#888" font-family="sans-serif" font-size="10">  Ølet tar opp mer CO₂ ved kjøling</text>
    <text x="15" y="214" fill="#888" font-family="sans-serif" font-size="10">  → Overkarbonert / skumfontene</text>
    <text x="15" y="238" fill="#888" font-family="sans-serif" font-size="10">Force carb = erfaring nødvendig</text>
  </g>

  <!-- CO2 volumes by style -->
  <g transform="translate(30, 325)">
    <text x="370" y="0" text-anchor="middle" fill="#f5f5f5" font-family="sans-serif" font-size="12" font-weight="bold">CO₂-VOLUM PER ØLSTIL</text>
    <rect x="0" y="8" width="740" height="22" rx="3" fill="#2a2a2a"/>
    <text x="10" y="23" fill="#888" font-family="sans-serif" font-size="10" font-weight="bold">ØLSTIL</text>
    <text x="420" y="23" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="10" font-weight="bold">CO₂-VOLUM</text>
    <text x="600" y="23" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="10" font-weight="bold">KARAKTER</text>

    <!-- Style rows with bars -->
    <rect x="0" y="32" width="740" height="20" rx="2" fill="#1e1e1e"/>
    <text x="10" y="46" fill="#f5f5f5" font-family="sans-serif" font-size="10">Britisk bitter / real ale</text>
    <rect x="360" y="35" width="50" height="12" rx="2" fill="#4a90d9"/>
    <text x="420" y="46" text-anchor="middle" fill="#f5f5f5" font-family="sans-serif" font-size="10" font-weight="bold">1,5–2,0</text>
    <text x="600" y="46" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="10">Flat, myk</text>

    <rect x="0" y="54" width="740" height="20" rx="2" fill="#1a1a1a"/>
    <text x="10" y="68" fill="#f5f5f5" font-family="sans-serif" font-size="10">American lager / standard ale</text>
    <rect x="360" y="57" width="75" height="12" rx="2" fill="#5aaa5a"/>
    <text x="420" y="68" text-anchor="middle" fill="#f5f5f5" font-family="sans-serif" font-size="10" font-weight="bold">2,4–2,6</text>
    <text x="600" y="68" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="10">Standard, frisk</text>

    <rect x="0" y="76" width="740" height="20" rx="2" fill="#1e1e1e"/>
    <text x="10" y="90" fill="#f5f5f5" font-family="sans-serif" font-size="10">Belgisk tripel / saison</text>
    <rect x="360" y="79" width="100" height="12" rx="2" fill="#e0a030"/>
    <text x="420" y="90" text-anchor="middle" fill="#f5f5f5" font-family="sans-serif" font-size="10" font-weight="bold">3,0–3,5</text>
    <text x="600" y="90" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="10">Perlende, tørr</text>

    <rect x="0" y="98" width="740" height="20" rx="2" fill="#1a1a1a"/>
    <text x="10" y="112" fill="#f5f5f5" font-family="sans-serif" font-size="10">Hefeweizen / witbier</text>
    <rect x="360" y="101" width="128" height="12" rx="2" fill="#dd3333"/>
    <text x="420" y="112" text-anchor="middle" fill="#f5f5f5" font-family="sans-serif" font-size="10" font-weight="bold">3,5–4,5</text>
    <text x="600" y="112" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="10">Svært høy, eksplosiv</text>
  </g>
</svg>
