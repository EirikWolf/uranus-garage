<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <rect width="800" height="450" fill="#1a1a1a"/>
  <text x="400" y="30" text-anchor="middle" fill="#f5f5f5" font-family="sans-serif" font-size="18" font-weight="bold">Gjæringsskap av Gammel Kjøleskap</text>

  <!-- Fridge exterior -->
  <g transform="translate(60, 45)">
    <!-- Fridge body -->
    <rect x="0" y="0" width="280" height="360" rx="12" fill="#2a2a2a" stroke="#555" stroke-width="2.5"/>
    <!-- Door outline -->
    <rect x="8" y="8" width="264" height="344" rx="8" fill="#262626" stroke="#444" stroke-width="1"/>
    <!-- Door handle -->
    <rect x="248" y="130" width="16" height="80" rx="6" fill="#555" stroke="#666" stroke-width="1"/>

    <!-- Interior (open view) -->
    <rect x="20" y="20" width="240" height="320" rx="6" fill="#1a1a1a" stroke="#333" stroke-width="1"/>

    <!-- Shelves removed indicator -->
    <text x="140" y="45" text-anchor="middle" fill="#555" font-family="sans-serif" font-size="9">hyller fjernet</text>

    <!-- Fermenter 1 (left) -->
    <rect x="28" y="60" width="100" height="230" rx="10" fill="#2d1a2d" stroke="#9b6bc7" stroke-width="2"/>
    <rect x="32" y="120" width="92" height="166" rx="6" fill="#3a2040" opacity="0.7"/>
    <!-- Fermenter 1 label -->
    <text x="78" y="88" text-anchor="middle" fill="#9b6bc7" font-family="sans-serif" font-size="9" font-weight="bold">FERMENTOR 1</text>
    <text x="78" y="100" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="8">ALE ~19°C</text>
    <!-- Airlock 1 -->
    <rect x="68" y="50" width="20" height="12" rx="4" fill="#666" stroke="#888" stroke-width="1"/>
    <line x1="78" y1="50" x2="78" y2="60" stroke="#888" stroke-width="1.5"/>

    <!-- Fermenter 2 (right) -->
    <rect x="140" y="85" width="100" height="205" rx="10" fill="#1a2030" stroke="#4a90d9" stroke-width="2"/>
    <rect x="144" y="135" width="92" height="151" rx="6" fill="#202838" opacity="0.7"/>
    <!-- Fermenter 2 label -->
    <text x="190" y="105" text-anchor="middle" fill="#4a90d9" font-family="sans-serif" font-size="9" font-weight="bold">FERMENTOR 2</text>
    <text x="190" y="117" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="8">LAGER ~10°C</text>
    <!-- Airlock 2 -->
    <rect x="180" y="75" width="20" height="12" rx="4" fill="#666" stroke="#888" stroke-width="1"/>
    <line x1="190" y1="75" x2="190" y2="85" stroke="#888" stroke-width="1.5"/>

    <!-- Temperature zones marked -->
    <line x1="20" y1="175" x2="260" y2="175" stroke="#333" stroke-width="1" stroke-dasharray="4,3"/>

    <!-- Fan -->
    <circle cx="140" cy="310" r="22" fill="#222" stroke="#e0a030" stroke-width="1.5"/>
    <circle cx="140" cy="310" r="15" fill="none" stroke="#e0a030" stroke-width="1" opacity="0.5"/>
    <!-- Fan blades -->
    <path d="M140 295 Q148 302 140 310" stroke="#e0a030" stroke-width="2" fill="none"/>
    <path d="M155 310 Q148 318 140 310" stroke="#e0a030" stroke-width="2" fill="none"/>
    <path d="M140 325 Q132 318 140 310" stroke="#e0a030" stroke-width="2" fill="none"/>
    <path d="M125 310 Q132 302 140 310" stroke="#e0a030" stroke-width="2" fill="none"/>
    <text x="140" y="345" text-anchor="middle" fill="#e0a030" font-family="sans-serif" font-size="8">Vifte — luftsirkulasjon</text>
  </g>

  <!-- Inkbird controller on wall -->
  <g transform="translate(385, 75)">
    <text x="80" y="0" text-anchor="middle" fill="#f5f5f5" font-family="sans-serif" font-size="12" font-weight="bold">INKBIRD ITC-308</text>
    <rect x="0" y="10" width="160" height="100" rx="8" fill="#222" stroke="#5aaa5a" stroke-width="2"/>
    <!-- Display -->
    <rect x="10" y="18" width="140" height="40" rx="4" fill="#001800"/>
    <text x="80" y="38" text-anchor="middle" fill="#5aaa5a" font-family="sans-serif" font-size="16" font-weight="bold">19.2°C</text>
    <text x="80" y="52" text-anchor="middle" fill="#3a8a3a" font-family="sans-serif" font-size="9">Aktuell temp</text>
    <!-- Buttons -->
    <rect x="10" y="64" width="35" height="18" rx="3" fill="#333" stroke="#555" stroke-width="1"/>
    <text x="27" y="76" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="8">SET</text>
    <rect x="50" y="64" width="35" height="18" rx="3" fill="#333" stroke="#555" stroke-width="1"/>
    <text x="67" y="76" text-anchor="middle" fill="#4a90d9" font-family="sans-serif" font-size="8">COOL</text>
    <rect x="90" y="64" width="35" height="18" rx="3" fill="#333" stroke="#555" stroke-width="1"/>
    <text x="107" y="76" text-anchor="middle" fill="#dd3333" font-family="sans-serif" font-size="8">HEAT</text>
    <!-- Probe wire -->
    <line x1="80" y1="110" x2="80" y2="140" stroke="#888" stroke-width="2" stroke-dasharray="3,2"/>
    <circle cx="80" cy="143" r="5" fill="#555" stroke="#888" stroke-width="1"/>
    <text x="80" y="158" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="8">NTC probe</text>
    <text x="80" y="170" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="8">inn i skap</text>

    <!-- Power outlets -->
    <rect x="0" y="185" width="160" height="60" rx="6" fill="#222" stroke="#444" stroke-width="1"/>
    <text x="80" y="202" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="9" font-weight="bold">STIKKONTAKTER:</text>
    <rect x="10" y="210" width="65" height="25" rx="4" fill="#2d1a1a" stroke="#dd3333" stroke-width="1.5"/>
    <text x="42" y="226" text-anchor="middle" fill="#dd3333" font-family="sans-serif" font-size="8" font-weight="bold">VARME</text>
    <rect x="85" y="210" width="65" height="25" rx="4" fill="#1a2030" stroke="#4a90d9" stroke-width="1.5"/>
    <text x="117" y="226" text-anchor="middle" fill="#4a90d9" font-family="sans-serif" font-size="8" font-weight="bold">KJØLING</text>
  </g>

  <!-- Temperature zones explanation -->
  <g transform="translate(385, 285)">
    <text x="190" y="0" text-anchor="middle" fill="#f5f5f5" font-family="sans-serif" font-size="12" font-weight="bold">TEMPERATURKONTROLL</text>
    <rect x="0" y="10" width="380" height="30" rx="5" fill="#2d1a1a" stroke="#dd3333" stroke-width="1.5"/>
    <rect x="2" y="12" width="180" height="26" rx="4" fill="#dd3333" opacity="0.2"/>
    <text x="10" y="30" fill="#dd3333" font-family="sans-serif" font-size="10" font-weight="bold">VARME-modus:</text>
    <text x="105" y="30" fill="#888" font-family="sans-serif" font-size="10">Varmefolie/pære aktiveres når for kaldt</text>

    <rect x="0" y="46" width="380" height="30" rx="5" fill="#1a2030" stroke="#4a90d9" stroke-width="1.5"/>
    <rect x="2" y="48" width="180" height="26" rx="4" fill="#4a90d9" opacity="0.2"/>
    <text x="10" y="66" fill="#4a90d9" font-family="sans-serif" font-size="10" font-weight="bold">KJØLE-modus:</text>
    <text x="105" y="66" fill="#888" font-family="sans-serif" font-size="10">Kompressor aktiveres når for varmt</text>

    <rect x="0" y="82" width="380" height="50" rx="5" fill="#222" stroke="#333" stroke-width="1"/>
    <text x="10" y="98" fill="#888" font-family="sans-serif" font-size="10">Typisk innstilling: Sett-punkt 19°C, diff ±0.5°C</text>
    <text x="10" y="112" fill="#888" font-family="sans-serif" font-size="10">Kompressor delay: min 3 min (beskytt motor)</text>
    <text x="10" y="126" fill="#5aaa5a" font-family="sans-serif" font-size="10">→ Stabilt område holder temperatur ±0.3°C</text>
  </g>

  <!-- Shopping list bottom -->
  <rect x="60" y="415" width="680" height="28" rx="6" stroke="#444" stroke-width="1" fill="#222"/>
  <text x="80" y="433" fill="#e0a030" font-family="sans-serif" font-size="10" font-weight="bold">TRENGER:</text>
  <text x="155" y="433" fill="#888" font-family="sans-serif" font-size="10">Gammel kjøleskap  •  Inkbird ITC-308 (~400 kr)  •  Varmefolie/pære  •  Liten vifte  •  Termometerprobe</text>
</svg>
