<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <rect width="800" height="450" fill="#1a1a1a"/>
  <text x="400" y="30" text-anchor="middle" fill="#f5f5f5" font-family="sans-serif" font-size="18" font-weight="bold">Hop Spider — Ren Vørter, Ingen Trøbbel</text>

  <!-- Before: messy kettle -->
  <g transform="translate(30, 55)">
    <text x="140" y="0" text-anchor="middle" fill="#dd3333" font-family="sans-serif" font-size="13" font-weight="bold">UTEN hop spider</text>
    <!-- Kettle -->
    <rect x="30" y="18" width="220" height="200" rx="12" fill="#2d2820" stroke="#888" stroke-width="2"/>
    <rect x="20" y="14" width="240" height="14" rx="5" fill="#555" stroke="#666" stroke-width="1"/>
    <!-- Wort -->
    <rect x="34" y="80" width="212" height="134" rx="6" fill="#3d3015" opacity="0.8"/>
    <!-- Hop trub mess -->
    <ellipse cx="80" cy="195" rx="30" ry="8" fill="#5aaa5a" opacity="0.6"/>
    <ellipse cx="140" cy="200" rx="25" ry="7" fill="#5aaa5a" opacity="0.5"/>
    <ellipse cx="200" cy="192" rx="28" ry="8" fill="#5aaa5a" opacity="0.6"/>
    <circle cx="100" cy="170" r="6" fill="#5aaa5a" opacity="0.4"/>
    <circle cx="160" cy="165" r="8" fill="#5aaa5a" opacity="0.5"/>
    <circle cx="120" cy="185" r="5" fill="#5aaa5a" opacity="0.4"/>
    <circle cx="175" cy="178" r="7" fill="#5aaa5a" opacity="0.45"/>
    <!-- Floating pellets -->
    <rect x="90" y="140" width="12" height="6" rx="2" fill="#4a8a30" opacity="0.7"/>
    <rect x="150" y="148" width="10" height="5" rx="2" fill="#4a8a30" opacity="0.6"/>
    <rect x="185" y="135" width="11" height="6" rx="2" fill="#4a8a30" opacity="0.7"/>
    <text x="140" y="235" text-anchor="middle" fill="#dd3333" font-family="sans-serif" font-size="10">Trub og humle i vørter</text>
    <text x="140" y="248" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="9">Tetter sil, vanskelig å overføre</text>
  </g>

  <!-- Arrow -->
  <g transform="translate(310, 160)">
    <path d="M0 20 L60 20" stroke="#5aaa5a" stroke-width="3" marker-end="url(#bigArr)"/>
    <defs>
      <marker id="bigArr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
        <path d="M0,0 L10,5 L0,10 Z" fill="#5aaa5a"/>
      </marker>
    </defs>
    <text x="30" y="12" text-anchor="middle" fill="#5aaa5a" font-family="sans-serif" font-size="10" font-weight="bold">HOP SPIDER</text>
  </g>

  <!-- After: clean kettle with hop spider -->
  <g transform="translate(390, 55)">
    <text x="180" y="0" text-anchor="middle" fill="#5aaa5a" font-family="sans-serif" font-size="13" font-weight="bold">MED hop spider</text>
    <!-- Kettle -->
    <rect x="30" y="18" width="300" height="200" rx="12" fill="#2d2820" stroke="#e0a030" stroke-width="2"/>
    <rect x="20" y="14" width="320" height="14" rx="5" fill="#555" stroke="#666" stroke-width="1"/>
    <!-- Clean wort -->
    <rect x="34" y="80" width="292" height="134" rx="6" fill="#3d3015" opacity="0.5"/>
    <!-- Hop spider frame hanging on kettle edge -->
    <rect x="200" y="12" width="8" height="30" rx="2" fill="#888" stroke="#aaa" stroke-width="1"/>
    <rect x="280" y="12" width="8" height="30" rx="2" fill="#888" stroke="#aaa" stroke-width="1"/>
    <rect x="196" y="40" width="100" height="4" rx="2" fill="#888"/>
    <!-- Mesh basket -->
    <rect x="200" y="44" width="96" height="120" rx="6" fill="none" stroke="#aaa" stroke-width="2"/>
    <!-- Mesh pattern -->
    <line x1="216" y1="44" x2="216" y2="164" stroke="#888" stroke-width="0.8" opacity="0.5"/>
    <line x1="232" y1="44" x2="232" y2="164" stroke="#888" stroke-width="0.8" opacity="0.5"/>
    <line x1="248" y1="44" x2="248" y2="164" stroke="#888" stroke-width="0.8" opacity="0.5"/>
    <line x1="264" y1="44" x2="264" y2="164" stroke="#888" stroke-width="0.8" opacity="0.5"/>
    <line x1="280" y1="44" x2="280" y2="164" stroke="#888" stroke-width="0.8" opacity="0.5"/>
    <line x1="200" y1="64" x2="296" y2="64" stroke="#888" stroke-width="0.8" opacity="0.5"/>
    <line x1="200" y1="84" x2="296" y2="84" stroke="#888" stroke-width="0.8" opacity="0.5"/>
    <line x1="200" y1="104" x2="296" y2="104" stroke="#888" stroke-width="0.8" opacity="0.5"/>
    <line x1="200" y1="124" x2="296" y2="124" stroke="#888" stroke-width="0.8" opacity="0.5"/>
    <line x1="200" y1="144" x2="296" y2="144" stroke="#888" stroke-width="0.8" opacity="0.5"/>
    <!-- Hops inside basket -->
    <ellipse cx="248" cy="130" rx="35" ry="20" fill="#5aaa5a" opacity="0.5"/>
    <circle cx="235" cy="118" r="6" fill="#5aaa5a" opacity="0.6"/>
    <circle cx="255" cy="122" r="7" fill="#5aaa5a" opacity="0.55"/>
    <circle cx="262" cy="112" r="5" fill="#5aaa5a" opacity="0.5"/>
    <!-- Clean wort area (no trub) -->
    <text x="110" y="180" text-anchor="middle" fill="#e0a030" font-family="sans-serif" font-size="10">Ren vørter</text>
    <text x="248" y="180" text-anchor="middle" fill="#5aaa5a" font-family="sans-serif" font-size="9">Humle holdes</text>
    <text x="248" y="192" text-anchor="middle" fill="#5aaa5a" font-family="sans-serif" font-size="9">i kurven</text>
    <text x="180" y="232" text-anchor="middle" fill="#5aaa5a" font-family="sans-serif" font-size="10">Ren overføring til fermentor</text>
    <text x="180" y="245" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="9">Silen tettes ikke lenger</text>
  </g>

  <!-- Parts and build -->
  <rect x="30" y="320" width="360" height="115" rx="8" fill="#222" stroke="#333" stroke-width="1"/>
  <text x="50" y="340" fill="#e0a030" font-family="sans-serif" font-size="12" font-weight="bold">BYGG SELV — DELELISTE:</text>
  <g transform="translate(50, 352)">
    <rect x="0" y="0" width="8" height="8" rx="1" fill="#e0a030"/>
    <text x="14" y="8" fill="#999" font-family="sans-serif" font-size="10">Rustfritt stålnett (500 micron) — 30×40 cm</text>
    <rect x="0" y="18" width="8" height="8" rx="1" fill="#e0a030"/>
    <text x="14" y="26" fill="#999" font-family="sans-serif" font-size="10">Rustfri stålstav / wire for ramme (3–4mm)</text>
    <rect x="0" y="36" width="8" height="8" rx="1" fill="#e0a030"/>
    <text x="14" y="44" fill="#999" font-family="sans-serif" font-size="10">S-kroker eller bøyler for oppheng</text>
    <rect x="0" y="54" width="8" height="8" rx="1" fill="#e0a030"/>
    <text x="14" y="62" fill="#999" font-family="sans-serif" font-size="10">Rustfri sveisepinne / pop-rivets</text>
    <rect x="0" y="72" width="8" height="8" rx="1" fill="#e0a030"/>
    <text x="14" y="80" fill="#999" font-family="sans-serif" font-size="10">Alternativ: kjøp ferdig fra Alibaba (~100 kr)</text>
  </g>

  <rect x="410" y="320" width="360" height="115" rx="8" fill="#222" stroke="#333" stroke-width="1"/>
  <text x="430" y="340" fill="#5aaa5a" font-family="sans-serif" font-size="12" font-weight="bold">BRUKSTIPS:</text>
  <g transform="translate(430, 352)">
    <rect x="0" y="0" width="8" height="8" rx="1" fill="#5aaa5a"/>
    <text x="14" y="8" fill="#999" font-family="sans-serif" font-size="10">Størrelse: 15×15×20 cm for 20L brygg</text>
    <rect x="0" y="18" width="8" height="8" rx="1" fill="#5aaa5a"/>
    <text x="14" y="26" fill="#999" font-family="sans-serif" font-size="10">Heng i kjelen slik at bunnen er under vørter</text>
    <rect x="0" y="36" width="8" height="8" rx="1" fill="#5aaa5a"/>
    <text x="14" y="44" fill="#999" font-family="sans-serif" font-size="10">Tilsett humle rett i kurven under kok</text>
    <rect x="0" y="54" width="8" height="8" rx="1" fill="#5aaa5a"/>
    <text x="14" y="62" fill="#999" font-family="sans-serif" font-size="10">Løft ut kurven etter kok — la det renne av</text>
    <rect x="0" y="72" width="8" height="8" rx="1" fill="#5aaa5a"/>
    <text x="14" y="80" fill="#999" font-family="sans-serif" font-size="10">Fungerer også for whirlpool/hopstand</text>
  </g>
</svg>
