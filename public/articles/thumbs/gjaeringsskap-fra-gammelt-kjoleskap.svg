  <rect x="100" y="42" width="40" height="68" rx="6" fill="#1a2030" stroke="#4a90d9" stroke-width="1.5"/>
  <rect x="102" y="58" width="36" height="50" rx="4" fill="#202838" opacity="0.7"/>
