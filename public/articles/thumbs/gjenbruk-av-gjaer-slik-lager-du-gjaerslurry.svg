<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140" fill="none">
  <rect width="200" height="140" fill="#2d2d2d"/>
  <!-- Mason jar -->
  <rect x="65" y="32" width="70" height="88" rx="4" fill="#1a2a1a" stroke="#5aaa5a" stroke-width="1.5" opacity="0.9"/>
  <!-- Jar lid -->
  <rect x="60" y="24" width="80" height="12" rx="4" fill="#2a3a2a" stroke="#5aaa5a" stroke-width="1.5"/>
  <!-- Yeast slurry layers -->
  <!-- Clear beer layer top -->
  <rect x="66" y="33" width="68" height="25" rx="2" fill="#c08030" opacity="0.15"/>
  <!-- Yeast in suspension middle -->
  <rect x="66" y="58" width="68" height="22" rx="0" fill="#8a6020" opacity="0.3"/>
  <!-- Thick yeast sediment bottom -->
  <rect x="66" y="80" width="68" height="38" rx="2" fill="#5aaa5a" opacity="0.35"/>
  <!-- Yeast cells in sediment -->
  <circle cx="82" cy="95" r="5" fill="#5aaa5a" opacity="0.5"/>
  <circle cx="95" cy="100" r="4.5" fill="#5aaa5a" opacity="0.45"/>
  <circle cx="108" cy="93" r="5" fill="#5aaa5a" opacity="0.5"/>
  <circle cx="120" cy="99" r="4" fill="#5aaa5a" opacity="0.4"/>
  <circle cx="88" cy="108" r="4" fill="#5aaa5a" opacity="0.4"/>
  <circle cx="114" cy="109" r="4.5" fill="#5aaa5a" opacity="0.45"/>
  <!-- Recycle arrow -->
  <path d="M148 55 Q165 70 148 85" fill="none" stroke="#5aaa5a" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="148" y1="85" x2="143" y2="78" stroke="#5aaa5a" stroke-width="2"/>
  <line x1="148" y1="85" x2="155" y2="80" stroke="#5aaa5a" stroke-width="2"/>
</svg>
