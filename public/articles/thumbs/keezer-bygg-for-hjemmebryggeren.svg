<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140" fill="none">
  <rect width="200" height="140" fill="#2d2d2d"/>
  <!-- Chest freezer body -->
  <rect x="20" y="50" width="160" height="78" rx="8" fill="#2a2a2a" stroke="#4a90d9" stroke-width="2.5"/>
  <!-- Lid -->
  <rect x="20" y="35" width="160" height="18" rx="6" fill="#333" stroke="#4a90d9" stroke-width="2"/>
  <!-- Collar (wood) -->
  <rect x="20" y="50" width="160" height="16" fill="#6a3a10" stroke="#8a4a18" stroke-width="1"/>
  <!-- Tap handles -->
  <rect x="55" y="28" width="10" height="26" rx="3" fill="#dd3333"/>
  <ellipse cx="60" cy="26" rx="10" ry="8" fill="#dd3333"/>
  <rect x="95" y="28" width="10" height="26" rx="3" fill="#e0a030"/>
  <ellipse cx="100" cy="26" rx="10" ry="8" fill="#e0a030"/>
  <rect x="135" y="28" width="10" height="26" rx="3" fill="#5aaa5a"/>
  <ellipse cx="140" cy="26" rx="10" ry="8" fill="#5aaa5a"/>
  <!-- CO2 tank hint inside -->
  <rect x="148" y="70" width="22" height="48" rx="8" fill="#555" stroke="#888" stroke-width="1.5"/>
</svg>
