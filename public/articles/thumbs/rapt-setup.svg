  <!-- RAPT Pill floating in fermenter -->
  <!-- Fermenter outline -->
  <rect x="35" y="20" width="130" height="105" rx="10" fill="#1a2030" stroke="#4a90d9" stroke-width="2"/>
  <rect x="39" y="48" width="122" height="73" rx="6" fill="#202838" opacity="0.8"/>
  <!-- RAPT Pill device - capsule shape -->
