<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140" fill="none">
  <rect width="200" height="140" fill="#2d2d2d"/>
  <!-- Pressure gauge -->
  <circle cx="100" cy="68" r="44" fill="#222" stroke="#5aaa5a" stroke-width="3"/>
  <circle cx="100" cy="68" r="34" fill="#1a1a2a" stroke="#333" stroke-width="1.5"/>
  <!-- Gauge markings -->
  <line x1="100" y1="38" x2="100" y2="44" stroke="#888" stroke-width="1.5"/>
  <line x1="126" y1="46" x2="122" y2="51" stroke="#888" stroke-width="1.5"/>
  <line x1="134" y1="68" x2="128" y2="68" stroke="#888" stroke-width="1.5"/>
  <line x1="74" y1="46" x2="78" y2="51" stroke="#888" stroke-width="1.5"/>
  <line x1="66" y1="68" x2="72" y2="68" stroke="#888" stroke-width="1.5"/>
  <!-- Needle -->
  <line x1="100" y1="68" x2="118" y2="50" stroke="#dd3333" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="100" cy="68" r="4" fill="#dd3333"/>
  <!-- PSI label -->
  <text x="100" y="92" text-anchor="middle" fill="#5aaa5a" font-family="sans-serif" font-size="10" font-weight="bold">PSI</text>
  <!-- Mount stem -->
  <rect x="92" y="112" width="16" height="16" rx="3" fill="#555" stroke="#888" stroke-width="1.5"/>
</svg>
