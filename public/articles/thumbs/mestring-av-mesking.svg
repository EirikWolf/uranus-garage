<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140" fill="none">
  <rect width="200" height="140" fill="#2d2d2d"/>
  <!-- Thermometer -->
  <rect x="88" y="18" width="24" height="80" rx="12" fill="#333" stroke="#888" stroke-width="2"/>
  <circle cx="100" cy="108" r="18" fill="#333" stroke="#dd3333" stroke-width="2"/>
  <circle cx="100" cy="108" r="12" fill="#dd3333"/>
  <!-- Mercury column -->
  <rect x="94" y="50" width="12" height="58" rx="6" fill="#dd3333"/>
  <!-- Temperature marks -->
  <line x1="112" y1="40" x2="120" y2="40" stroke="#e0a030" stroke-width="2"/>
  <line x1="112" y1="56" x2="120" y2="56" stroke="#5aaa5a" stroke-width="2"/>
  <line x1="112" y1="72" x2="120" y2="72" stroke="#5aaa5a" stroke-width="2"/>
  <line x1="112" y1="88" x2="120" y2="88" stroke="#4a90d9" stroke-width="2"/>
</svg>
