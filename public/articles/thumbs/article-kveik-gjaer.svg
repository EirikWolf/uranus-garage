<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140" fill="none">
  <rect width="200" height="140" fill="#2d2d2d"/>
  <!-- Thermometer showing high temp -->
  <rect x="54" y="18" width="18" height="72" rx="9" fill="#333" stroke="#888" stroke-width="1.5"/>
  <circle cx="63" cy="100" r="14" fill="#333" stroke="#dd3333" stroke-width="1.5"/>
  <circle cx="63" cy="100" r="9" fill="#dd3333"/>
  <rect x="58" y="42" width="10" height="58" rx="5" fill="#dd3333"/>
  <!-- High temp marker -->
  <line x1="72" y1="30" x2="80" y2="30" stroke="#dd3333" stroke-width="2"/>
  <text x="84" y="34" fill="#dd3333" font-family="sans-serif" font-size="9" font-weight="bold">40°C</text>
  <!-- Yeast cells (round, budding) -->
  <circle cx="130" cy="60" r="18" fill="#2a1a3a" stroke="#9b6bc7" stroke-width="2"/>
  <circle cx="148" cy="72" r="14" fill="#2a1a3a" stroke="#9b6bc7" stroke-width="1.8"/>
  <circle cx="120" cy="80" r="12" fill="#2a1a3a" stroke="#9b6bc7" stroke-width="1.5"/>
  <!-- Budding yeast -->
  <circle cx="145" cy="48" r="7" fill="#3a2050" stroke="#9b6bc7" stroke-width="1.5"/>
  <circle cx="158" cy="85" r="6" fill="#3a2050" stroke="#9b6bc7" stroke-width="1.2"/>
  <!-- Speed lines showing fast fermentation -->
  <line x1="88" y1="55" x2="108" y2="55" stroke="#e0a030" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="88" y1="65" x2="108" y2="65" stroke="#e0a030" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="88" y1="75" x2="108" y2="75" stroke="#e0a030" stroke-width="1.5" stroke-dasharray="3,2"/>
</svg>
