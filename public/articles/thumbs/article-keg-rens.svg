<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140" fill="none">
  <rect width="200" height="140" fill="#2d2d2d"/>
  <!-- Corny keg body -->
  <rect x="62" y="30" width="60" height="90" rx="10" fill="#2a2a2a" stroke="#888" stroke-width="2"/>
  <!-- Keg ribs -->
  <rect x="62" y="48" width="60" height="6" rx="2" fill="#333" stroke="#666" stroke-width="1"/>
  <rect x="62" y="90" width="60" height="6" rx="2" fill="#333" stroke="#666" stroke-width="1"/>
  <!-- Lid -->
  <ellipse cx="92" cy="30" rx="30" ry="8" fill="#3a3a3a" stroke="#888" stroke-width="1.5"/>
  <!-- Post fittings -->
  <rect x="78" y="18" width="10" height="14" rx="4" fill="#555" stroke="#888" stroke-width="1"/>
  <rect x="96" y="18" width="10" height="14" rx="4" fill="#555" stroke="#888" stroke-width="1"/>
  <!-- Cleaning bubbles -->
  <circle cx="140" cy="55" r="7" fill="none" stroke="#4a90d9" stroke-width="1.5" opacity="0.7"/>
  <circle cx="152" cy="45" r="5" fill="none" stroke="#4a90d9" stroke-width="1.5" opacity="0.6"/>
  <circle cx="145" cy="72" r="6" fill="none" stroke="#4a90d9" stroke-width="1.5" opacity="0.5"/>
  <circle cx="155" cy="62" r="4" fill="none" stroke="#4a90d9" stroke-width="1.2" opacity="0.5"/>
  <!-- StarSan check -->
  <text x="148" y="100" text-anchor="middle" fill="#5aaa5a" font-family="sans-serif" font-size="8" font-weight="bold">✓ PBW</text>
  <text x="148" y="112" text-anchor="middle" fill="#5aaa5a" font-family="sans-serif" font-size="8">StarSan</text>
</svg>
