<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140" fill="none">
  <rect width="200" height="140" fill="#2d2d2d"/>
  <!-- Notebook -->
  <rect x="50" y="22" width="90" height="96" rx="4" fill="#1a2a3a" stroke="#4a90d9" stroke-width="1.5"/>
  <rect x="50" y="22" width="14" height="96" rx="4" fill="#1a3a5a" stroke="#4a90d9" stroke-width="1.5"/>
  <!-- Spiral binding -->
  <circle cx="57" cy="38" r="4" fill="none" stroke="#888" stroke-width="1.5"/>
  <circle cx="57" cy="54" r="4" fill="none" stroke="#888" stroke-width="1.5"/>
  <circle cx="57" cy="70" r="4" fill="none" stroke="#888" stroke-width="1.5"/>
  <circle cx="57" cy="86" r="4" fill="none" stroke="#888" stroke-width="1.5"/>
  <circle cx="57" cy="102" r="4" fill="none" stroke="#888" stroke-width="1.5"/>
  <!-- Text lines -->
  <line x1="72" y1="42" x2="130" y2="42" stroke="#4a90d9" stroke-width="1.5" opacity="0.7"/>
  <line x1="72" y1="54" x2="128" y2="54" stroke="#888" stroke-width="1" opacity="0.5"/>
  <line x1="72" y1="64" x2="125" y2="64" stroke="#888" stroke-width="1" opacity="0.5"/>
  <line x1="72" y1="74" x2="130" y2="74" stroke="#888" stroke-width="1" opacity="0.5"/>
  <line x1="72" y1="84" x2="120" y2="84" stroke="#888" stroke-width="1" opacity="0.5"/>
  <!-- OG/FG labels -->
  <text x="74" y="100" fill="#e0a030" font-family="sans-serif" font-size="9" font-weight="bold">OG</text>
  <text x="92" y="100" fill="#888" font-family="sans-serif" font-size="9">1.055</text>
  <text x="74" y="112" fill="#5aaa5a" font-family="sans-serif" font-size="9" font-weight="bold">FG</text>
  <text x="92" y="112" fill="#888" font-family="sans-serif" font-size="9">1.010</text>
  <!-- Pen -->
  <rect x="144" y="48" width="8" height="56" rx="4" fill="#e0a030" transform="rotate(20 144 48)"/>
  <polygon points="144,100 152,100 148,114" fill="#333" transform="rotate(20 144 48)"/>
</svg>
