<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140" fill="none">
  <rect width="200" height="140" fill="#2d2d2d"/>
  <!-- Brew kettle -->
  <path d="M45 45 L45 110 L155 110 L155 45 Z" fill="#1a1a1a" stroke="#888" stroke-width="1.5" rx="4"/>
  <rect x="40" y="38" width="120" height="10" rx="3" fill="#2a2a2a" stroke="#888" stroke-width="1.5"/>
  <!-- Hot wort -->
  <path d="M45 70 L155 70 L155 110 L45 110 Z" fill="#c07820" opacity="0.3"/>
  <!-- Copper coil inside kettle -->
  <ellipse cx="100" cy="72" rx="34" ry="10" fill="none" stroke="#c07820" stroke-width="2.5"/>
  <ellipse cx="100" cy="83" rx="34" ry="10" fill="none" stroke="#b06818" stroke-width="2.5"/>
  <ellipse cx="100" cy="94" rx="34" ry="10" fill="none" stroke="#c07820" stroke-width="2.5"/>
  <!-- Water in/out -->
  <line x1="66" y1="72" x2="52" y2="28" stroke="#4a90d9" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="134" y1="94" x2="148" y2="122" stroke="#4a90d9" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="52" cy="24" r="6" fill="#4a90d9" opacity="0.7"/>
  <!-- Steam -->
  <path d="M75 38 Q78 28 75 20" fill="none" stroke="#888" stroke-width="1.5" opacity="0.5"/>
  <path d="M100 38 Q103 28 100 20" fill="none" stroke="#888" stroke-width="1.5" opacity="0.5"/>
  <path d="M125 38 Q128 28 125 20" fill="none" stroke="#888" stroke-width="1.5" opacity="0.4"/>
</svg>
