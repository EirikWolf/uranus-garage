<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <rect width="800" height="500" fill="#1a1a1a"/>
  <text x="400" y="35" text-anchor="middle" fill="#f5f5f5" font-family="sans-serif" font-size="18" font-weight="bold">Keezer-bygg — Eksplodert Visning</text>

  <!-- Tap tower on top -->
  <g transform="translate(260, 50)">
    <rect x="80" y="0" width="120" height="60" rx="6" stroke="#e0a030" stroke-width="2" fill="#2d2820"/>
    <text x="140" y="25" text-anchor="middle" fill="#e0a030" font-family="sans-serif" font-size="11" font-weight="bold">TAPPETÅRN</text>
    <!-- Taps -->
    <rect x="90" y="30" width="15" height="25" rx="2" stroke="#ccc" stroke-width="1.5" fill="#444"/>
    <rect x="120" y="30" width="15" height="25" rx="2" stroke="#ccc" stroke-width="1.5" fill="#444"/>
    <rect x="150" y="30" width="15" height="25" rx="2" stroke="#ccc" stroke-width="1.5" fill="#444"/>
    <rect x="180" y="30" width="15" height="25" rx="2" stroke="#ccc" stroke-width="1.5" fill="#444"/>
    <text x="140" y="48" text-anchor="middle" fill="#999" font-family="sans-serif" font-size="7">4 TAPPER</text>
  </g>

  <!-- Arrow down -->
  <line x1="400" y1="115" x2="400" y2="135" stroke="#999" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Wood collar -->
  <g transform="translate(180, 140)">
    <rect x="0" y="0" width="440" height="70" rx="4" stroke="#8B6914" stroke-width="2.5" fill="#3d3015"/>
    <text x="220" y="25" text-anchor="middle" fill="#DEB887" font-family="sans-serif" font-size="13" font-weight="bold">TREKRAGE (COLLAR)</text>
    <text x="220" y="45" text-anchor="middle" fill="#999" font-family="sans-serif" font-size="10">Furu/eik, 150mm høy, lakkert</text>
    <!-- Holes for shanks -->
    <circle cx="80" cy="50" r="10" stroke="#444" stroke-width="1.5" fill="#222"/>
    <circle cx="160" cy="50" r="10" stroke="#444" stroke-width="1.5" fill="#222"/>
    <circle cx="280" cy="50" r="10" stroke="#444" stroke-width="1.5" fill="#222"/>
    <circle cx="360" cy="50" r="10" stroke="#444" stroke-width="1.5" fill="#222"/>
    <text x="220" y="65" text-anchor="middle" fill="#666" font-family="sans-serif" font-size="8">HULL FOR SHANKS</text>
  </g>

  <!-- Arrow down -->
  <line x1="400" y1="215" x2="400" y2="235" stroke="#999" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Chest freezer -->
  <g transform="translate(150, 240)">
    <rect x="0" y="0" width="500" height="200" rx="8" stroke="#4a90d9" stroke-width="2.5" fill="#1a2535"/>
    <text x="250" y="25" text-anchor="middle" fill="#4a90d9" font-family="sans-serif" font-size="14" font-weight="bold">FRYSEBOKS (200-300L)</text>

    <!-- Kegs inside -->
    <g transform="translate(30, 45)">
      <rect x="0" y="0" width="55" height="120" rx="25" stroke="#ccc" stroke-width="1.5" fill="#333"/>
      <text x="27" y="65" text-anchor="middle" fill="#999" font-family="sans-serif" font-size="8">19L</text>
      <text x="27" y="80" text-anchor="middle" fill="#dd3333" font-family="sans-serif" font-size="7">IPA</text>
    </g>
    <g transform="translate(100, 45)">
      <rect x="0" y="0" width="55" height="120" rx="25" stroke="#ccc" stroke-width="1.5" fill="#333"/>
      <text x="27" y="65" text-anchor="middle" fill="#999" font-family="sans-serif" font-size="8">19L</text>
      <text x="27" y="80" text-anchor="middle" fill="#e0a030" font-family="sans-serif" font-size="7">PILS</text>
    </g>
    <g transform="translate(170, 45)">
      <rect x="0" y="0" width="55" height="120" rx="25" stroke="#ccc" stroke-width="1.5" fill="#333"/>
      <text x="27" y="65" text-anchor="middle" fill="#999" font-family="sans-serif" font-size="8">19L</text>
      <text x="27" y="80" text-anchor="middle" fill="#5aaa5a" font-family="sans-serif" font-size="7">ESB</text>
    </g>
    <g transform="translate(240, 45)">
      <rect x="0" y="0" width="55" height="120" rx="25" stroke="#ccc" stroke-width="1.5" fill="#333"/>
      <text x="27" y="65" text-anchor="middle" fill="#999" font-family="sans-serif" font-size="8">19L</text>
      <text x="27" y="80" text-anchor="middle" fill="#9b6bc7" font-family="sans-serif" font-size="7">STOUT</text>
    </g>

    <!-- CO2 tank -->
    <g transform="translate(360, 35)">
      <rect x="0" y="0" width="40" height="100" rx="15" stroke="#dd3333" stroke-width="2" fill="#3a2020"/>
      <text x="20" y="55" text-anchor="middle" fill="#dd3333" font-family="sans-serif" font-size="9" font-weight="bold">CO₂</text>
      <!-- Regulator on top -->
      <rect x="5" y="-15" width="30" height="18" rx="3" stroke="#ccc" stroke-width="1" fill="#444"/>
      <text x="20" y="-2" text-anchor="middle" fill="#ccc" font-family="sans-serif" font-size="7">REG</text>
    </g>

    <!-- Gas lines -->
    <path d="M380 50 L310 50 L310 60" stroke="#dd3333" stroke-width="1" stroke-dasharray="2,2" fill="none"/>
    <path d="M380 55 L240 55 L240 60" stroke="#dd3333" stroke-width="1" stroke-dasharray="2,2" fill="none"/>
    <path d="M380 60 L170 60 L170 60" stroke="#dd3333" stroke-width="1" stroke-dasharray="2,2" fill="none"/>
    <path d="M380 65 L100 65 L100 60" stroke="#dd3333" stroke-width="1" stroke-dasharray="2,2" fill="none"/>

    <!-- Temp controller -->
    <rect x="420" y="55" width="60" height="80" rx="4" stroke="#5aaa5a" stroke-width="1.5" fill="#2d3d2d"/>
    <text x="450" y="80" text-anchor="middle" fill="#5aaa5a" font-family="sans-serif" font-size="8" font-weight="bold">INKBIRD</text>
    <rect x="430" y="90" width="40" height="20" rx="2" fill="#111"/>
    <text x="450" y="105" text-anchor="middle" fill="#5aaa5a" font-family="monospace" font-size="10">4°C</text>

    <text x="250" y="190" text-anchor="middle" fill="#666" font-family="sans-serif" font-size="9">4 x CORNY KEG (19L) + CO₂-TANK + TEMPERATURKONTROLLER</text>
  </g>

  <!-- Parts list -->
  <rect x="30" y="455" width="740" height="35" rx="4" stroke="#444" stroke-width="1" fill="#222"/>
  <text x="50" y="477" fill="#e0a030" font-family="sans-serif" font-size="11" font-weight="bold">DELER:</text>
  <text x="110" y="477" fill="#999" font-family="sans-serif" font-size="10">Fryseboks  |  Trekrage  |  4x Shanks  |  4x Tapper  |  CO₂-tank + regulator  |  4x Corny keg  |  Ølslanger  |  Inkbird</text>
</svg>
