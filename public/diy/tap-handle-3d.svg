<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <rect width="800" height="500" fill="#1a1a1a"/>
  <text x="400" y="35" text-anchor="middle" fill="#f5f5f5" font-family="sans-serif" font-size="18" font-weight="bold">3D-printet Tappekran-håndtak — Tverrsnitt</text>

  <!-- Handle cross-section -->
  <g transform="translate(150, 60)">
    <!-- Outer shell -->
    <path d="M60 0 L140 0 C170 0, 180 20, 180 40 L180 280 C180 320, 140 340, 100 340 C60 340, 20 320, 20 280 L20 40 C20 20, 30 0, 60 0 Z" stroke="#dd3333" stroke-width="2.5" fill="#3a2020"/>
    <text x="100" y="25" text-anchor="middle" fill="#dd3333" font-family="sans-serif" font-size="11" font-weight="bold">PETG / PLA</text>

    <!-- Logo area -->
    <rect x="50" y="60" width="100" height="80" rx="6" stroke="#e0a030" stroke-width="1.5" fill="#2d2820"/>
    <text x="100" y="95" text-anchor="middle" fill="#e0a030" font-family="sans-serif" font-size="16" font-style="italic">Uranus</text>
    <text x="100" y="115" text-anchor="middle" fill="#e0a030" font-family="sans-serif" font-size="14" font-style="italic">Garage</text>
    <text x="100" y="155" text-anchor="middle" fill="#999" font-family="sans-serif" font-size="9">LOGO-OMRÅDE</text>

    <!-- Beer name slot -->
    <rect x="45" y="170" width="110" height="35" rx="4" stroke="#4a90d9" stroke-width="1.5" fill="#1a2a3a"/>
    <text x="100" y="192" text-anchor="middle" fill="#4a90d9" font-family="sans-serif" font-size="12" font-weight="bold">Lucky Jack</text>
    <text x="100" y="220" text-anchor="middle" fill="#999" font-family="sans-serif" font-size="9">ØLNAVN (utskiftbart)</text>

    <!-- Thread area -->
    <rect x="70" y="270" width="60" height="60" rx="4" stroke="#5aaa5a" stroke-width="2" fill="#2d3d2d"/>
    <!-- Thread lines -->
    <line x1="75" y1="280" x2="125" y2="280" stroke="#5aaa5a" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="75" y1="290" x2="125" y2="290" stroke="#5aaa5a" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="75" y1="300" x2="125" y2="300" stroke="#5aaa5a" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="75" y1="310" x2="125" y2="310" stroke="#5aaa5a" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="75" y1="320" x2="125" y2="320" stroke="#5aaa5a" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="100" y="350" text-anchor="middle" fill="#5aaa5a" font-family="sans-serif" font-size="10">3/8"-16 UNC GJENGE</text>
  </g>

  <!-- Dimension annotations -->
  <g transform="translate(150, 60)">
    <!-- Height -->
    <line x1="200" y1="0" x2="200" y2="340" stroke="#999" stroke-width="1" stroke-dasharray="4,4"/>
    <line x1="195" y1="0" x2="210" y2="0" stroke="#999" stroke-width="1"/>
    <line x1="195" y1="340" x2="210" y2="340" stroke="#999" stroke-width="1"/>
    <text x="220" y="175" fill="#999" font-family="sans-serif" font-size="11" transform="rotate(90, 220, 175)">~120mm</text>

    <!-- Width -->
    <line x1="20" y1="370" x2="180" y2="370" stroke="#999" stroke-width="1" stroke-dasharray="4,4"/>
    <line x1="20" y1="365" x2="20" y2="380" stroke="#999" stroke-width="1"/>
    <line x1="180" y1="365" x2="180" y2="380" stroke="#999" stroke-width="1"/>
    <text x="100" y="390" text-anchor="middle" fill="#999" font-family="sans-serif" font-size="11">~50mm</text>
  </g>

  <!-- Print settings panel -->
  <rect x="440" y="80" width="310" height="330" rx="8" stroke="#444" stroke-width="1" fill="#222"/>
  <text x="595" y="110" text-anchor="middle" fill="#f5f5f5" font-family="sans-serif" font-size="14" font-weight="bold">PRINT-INNSTILLINGER</text>

  <text x="470" y="145" fill="#dd3333" font-family="sans-serif" font-size="12" font-weight="bold">Material</text>
  <text x="470" y="165" fill="#999" font-family="sans-serif" font-size="11">PETG (anbefalt) — fuktsikkert</text>
  <text x="470" y="182" fill="#999" font-family="sans-serif" font-size="11">PLA fungerer, men svakere</text>

  <text x="470" y="215" fill="#4a90d9" font-family="sans-serif" font-size="12" font-weight="bold">Lag-høyde</text>
  <text x="470" y="235" fill="#999" font-family="sans-serif" font-size="11">0.2mm for styrke</text>
  <text x="470" y="252" fill="#999" font-family="sans-serif" font-size="11">0.12mm for glatt overflate</text>

  <text x="470" y="285" fill="#5aaa5a" font-family="sans-serif" font-size="12" font-weight="bold">Infill</text>
  <text x="470" y="305" fill="#999" font-family="sans-serif" font-size="11">40-60% for solid grep</text>
  <text x="470" y="322" fill="#999" font-family="sans-serif" font-size="11">Gyroid-mønster anbefales</text>

  <text x="470" y="355" fill="#e0a030" font-family="sans-serif" font-size="12" font-weight="bold">Etterbehandling</text>
  <text x="470" y="375" fill="#999" font-family="sans-serif" font-size="11">Puss med 220-grit sandpapir</text>
  <text x="470" y="392" fill="#999" font-family="sans-serif" font-size="11">Spray med klar lakk for glans</text>

  <!-- Tip box -->
  <rect x="440" y="420" width="310" height="50" rx="6" stroke="#dd3333" stroke-width="1" fill="#2d1515"/>
  <text x="460" y="442" fill="#dd3333" font-family="sans-serif" font-size="11" font-weight="bold">TIPS:</text>
  <text x="460" y="458" fill="#999" font-family="sans-serif" font-size="10">Print gjenget hull separat og lim inn for bedre presisjon</text>
</svg>
